<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MHR 製造履歷系統 — 開發測試版</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  :root{
    --navy:#16335B; --navy2:#1B2A4A; --teal:#1C7A86; --teal-d:#155f69;
    --blue:#2B4C86; --gold:#D9912A; --goldbg:#FBF1DC;
    --green:#2E8B57; --red:#C0392B; --redbg:#FBEDED;
    --bg:#EEF2F7; --card:#FFFFFF; --ink:#1F2A37; --muted:#64707D;
    --line:#DCE3EC; --light:#F4F7FB; --purple:#6A4C93;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:"Noto Sans TC","Microsoft JhengHei","PingFang TC",-apple-system,sans-serif;
       background:var(--bg);color:var(--ink);font-size:15px;line-height:1.5}
  code,.mono{font-family:"Consolas","SF Mono",ui-monospace,monospace}
  .app{display:flex;min-height:100vh}
  /* ★ height 用 --vh 而非 100vh：body 有 zoom 時 100vh 不會跟著縮，側欄盒子會被放大成
     螢幕高×zoom（實測 1920 螢幕 937 → 側欄 1321px）→ 底部整個被推出畫面。
     --vh 由 fitScale 設為 innerHeight/zoom，讓側欄渲染後剛好等於螢幕高。 */
  .side{width:230px;background:var(--navy);color:#fff;flex-shrink:0;display:flex;flex-direction:column;position:sticky;top:0;height:var(--vh,100vh);overflow-y:auto}
  /* 側欄：14 個選單項要一頁放得下、不出現上下捲軸（原本每項 47px → 內容 977px 超出 820 視窗 157px） */
  .brand{padding:14px 18px 11px;border-bottom:1px solid rgba(255,255,255,.12)}
  .brand h1{font-size:20px;letter-spacing:1px}
  .brand .sub{font-size:11px;color:#9FB4CC;margin-top:3px}
  .brand .tag{display:inline-block;margin-top:8px;font-size:10px;background:var(--teal);padding:2px 8px;border-radius:10px}
  nav{padding:5px 0;flex:1}
  nav button{display:flex;align-items:center;gap:10px;width:100%;text-align:left;background:none;border:0;color:#C7D4E6;
    padding:6px 18px;font-size:13.5px;cursor:pointer;border-left:3px solid transparent;font-family:inherit}
  nav button .n{font-size:11px;color:#7FB0C8;width:16px}
  nav button:hover{background:rgba(255,255,255,.06);color:#fff}
  /* 選單的英文：側欄配色（.sec 預設的灰在深藍底上太暗） */
  nav button .sec{color:#7FB0C8;font-size:10px;margin-left:5px}
  nav button.on{background:rgba(28,122,134,.25);color:#fff;border-left-color:var(--teal)}
  nav .navsep{margin:6px 0 1px;padding:6px 18px 3px;font-size:11px;color:#7FB0C8;border-top:1px solid rgba(255,255,255,.14);letter-spacing:.5px}
  /* （navsep 的橫向樣式已隨側欄一起移到 ≤1024 的區塊；原本掛在 ≤760 會與側欄門檻不同步） */
  .side .foot{padding:8px 18px;font-size:10.5px;line-height:1.5;color:#7c8ba3;border-top:1px solid rgba(255,255,255,.1)}
  .devtools summary{cursor:pointer;color:#9FB4CC;list-style:none;padding:3px 0;user-select:none}
  .devtools summary::-webkit-details-marker{display:none}
  .devtools summary::before{content:'▸ '}
  .devtools[open] summary::before{content:'▾ '}
  .devtools .devbody{margin-top:3px}
  .side .foot a{color:#9FB4CC;cursor:pointer;text-decoration:underline}
  .lk{cursor:pointer;border-bottom:1px dashed var(--teal);color:inherit}
  .lk:hover{color:var(--teal)}
  .seq{display:inline-block;margin-left:6px;padding:1px 7px;border-radius:10px;background:#edf3f8;color:#34618c;font-size:11px;border:1px solid #d6e2ee;white-space:nowrap}
  .qms{display:inline-block;margin-top:5px;padding:2px 9px;border-radius:6px;font-size:12px;border:1px solid rgba(0,0,0,.06)}
  .main{flex:1;padding:18px 18px;min-width:0}
  .page-h{margin-bottom:14px}
  .page-h h2{font-size:16px;color:var(--navy)}
  .page-h p{color:var(--muted);font-size:12px;margin-top:3px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:16px;margin-bottom:16px;box-shadow:0 1px 3px rgba(20,40,70,.05)}
  .card h3{font-size:14px;color:var(--teal);margin-bottom:14px;display:flex;align-items:center;gap:8px}
  .card h3 .vi{font-size:10px;color:var(--muted);font-weight:400}
  .sec{font-weight:400;color:#9aa6b2;font-size:10px;margin-left:5px}
  th .sec{color:#bcd0e8;display:block;margin-left:0;font-size:10px;font-weight:400}
  .hnw th,.hnw td{white-space:nowrap}
  th{vertical-align:top}
  .recent th{white-space:nowrap}
  .recent th,.recent td{padding:6px 11px}
  .recent .pill{white-space:nowrap}
  .recent td:nth-child(7),.recent th:nth-child(7){text-align:right}
  .recent td:first-child,.recent th:first-child{padding-right:18px}
  .numtbl td:not(:first-child),.numtbl th:not(:first-child){text-align:right}
  .numtbl th,.numtbl td{padding:6px 7px}
  .numtbl .pill{padding:2px 7px}
  /* 右上角工具列：身分／登出 ＋ 語言切換（位置比照 QMS） */
  .topbar{position:absolute;top:12px;right:16px;z-index:60;display:flex;gap:8px;align-items:center;flex-wrap:wrap;justify-content:flex-end}
  .userbar{display:flex;align-items:center;gap:9px;background:#fff;border:1px solid var(--line);border-radius:9px;
    box-shadow:0 2px 8px rgba(20,40,70,.12);padding:5px 12px;font-size:12px;white-space:nowrap}
  .userbar .u-name{font-weight:700;color:var(--navy)}
  .userbar .u-meta{color:var(--muted)}
  .userbar .u-sep{color:var(--line)}
  .userbar a{color:var(--teal);cursor:pointer;text-decoration:none;font-weight:600}
  .userbar a:hover{text-decoration:underline}
  .langbar{display:flex;gap:0;background:#fff;border:1px solid var(--line);border-radius:9px;box-shadow:0 2px 8px rgba(20,40,70,.12);overflow:hidden}
  .langbar button{background:#fff;border:0;color:var(--muted);padding:6px 12px;font-size:12px;cursor:pointer;font-weight:600;letter-spacing:.3px}
  .langbar button+button{border-left:1px solid var(--line)}
  .langbar button.on{background:var(--teal);color:#fff}
  @media(max-width:900px){ .topbar{top:8px;right:8px;gap:5px} .langbar button{padding:5px 9px;font-size:11px}
    .userbar{padding:4px 9px;font-size:11px;gap:6px} .userbar .u-meta{display:none} }
  .grid{display:grid;gap:14px}
  .g2{grid-template-columns:1fr 1fr}.g3{grid-template-columns:1fr 1fr 1fr}.g4{grid-template-columns:repeat(4,1fr)}
  /* 平板橫式 / 中等寬度（901–1024）：保留側欄，但寬表格可橫向捲、四欄表單收成兩欄 */
  /* ★ 側欄改「頂部橫向選單」的門檻：≤1024（原本 900）。
     理由：現場用平板。iPad 橫式可用視窗只有 1024×694（1024×768 扣掉瀏覽器列），
     14 項直式選單需 754px 放不下 → 一定要上下捲。門檻設 1024 讓平板橫式自動改橫向選單，
     高度問題直接消失，且橫向大按鈕用手指點更好按。（單欄化/字級仍維持 ≤900 不動） */
  @media(max-width:1024px), (max-height:700px){
    .main{padding:22px 20px}
    .g4{grid-template-columns:1fr 1fr}
    table{display:block;overflow-x:auto;white-space:nowrap;-webkit-overflow-scrolling:touch}
    .app{flex-direction:column}
    .side{width:100%;height:auto;position:sticky;top:0;z-index:20;flex-direction:column}
    .brand{padding:12px 16px 10px;display:flex;align-items:baseline;gap:10px;flex-wrap:wrap}
    .brand h1{font-size:18px}
    .brand .sub{font-size:10px;margin-top:0}
    .brand .tag{margin-top:0}
    nav{display:flex;overflow-x:auto;padding:0;flex:none;-webkit-overflow-scrolling:touch}
    nav button{flex:0 0 auto;width:auto;border-left:0;border-bottom:3px solid transparent;padding:7px 8px;white-space:nowrap;font-size:12px;text-align:center;line-height:1.25}
    nav button.on{border-left:0;border-bottom-color:var(--teal)}
    nav button .n{display:none}
    /* ★ 橫向選單：英文換到中文下方。並排的話 14 項會爆寬 → 被迫左右捲（比上下捲更難用）。
       改成上下堆疊 → 每項寬度約少一半、一行放得下，且英文照樣保留。 */
    nav button .sec{display:block;margin-left:0;font-size:9px;line-height:1.15;opacity:.85}
    /* ★「⚙ 設定 / 管理」分隔標題在橫向模式隱藏 —— 它自己就佔 ~110px，
       但橫排時分組意義不大（項目本來就照順序排），省下來給選單項。 */
    nav .navsep{display:none}
    .side .foot{display:block;padding:8px 14px;border-top:1px solid rgba(255,255,255,.1);white-space:nowrap;overflow-x:auto;font-size:11px}
    .side .foot br{display:none}
    .side .foot a,.side .foot label{margin-right:14px}
  }
  /* 平板直式 / 手機（≤900）：全部單欄 */
  @media(max-width:900px){
    .g2,.g3,.g4{grid-template-columns:1fr}
    .main{padding:16px 14px;max-width:100%}
    .page-h h2{font-size:20px}
    .row{flex-wrap:wrap}
  }
  label{display:block;font-size:12px;font-weight:600;color:var(--muted);margin-bottom:5px}
  label .vi{font-weight:400;color:#9aa6b2}
  input,select,textarea{width:100%;padding:10px 12px;border:1.5px solid var(--line);border-radius:7px;font-size:15px;font-family:inherit;background:#fff}
  textarea{min-height:130px;resize:vertical;line-height:1.7}
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--teal)}
  input.mono{font-size:15px;letter-spacing:.3px}
  .btn{display:inline-flex;align-items:center;gap:7px;padding:11px 20px;border:0;border-radius:7px;font-size:15px;font-weight:600;
    cursor:pointer;font-family:inherit;color:#fff;background:var(--teal)}
  .btn:hover{filter:brightness(1.07)}.btn:active{transform:translateY(1px)}
  .btn.navy{background:var(--navy)}.btn.blue{background:var(--blue)}.btn.green{background:var(--green)}
  .btn.gold{background:var(--gold)}.btn.gray{background:#7a8696}.btn.red{background:var(--red)}.btn.purple{background:var(--purple)}
  .btn.lg{padding:15px 26px;font-size:17px}
  .btn.ghost{background:#fff;color:var(--navy);border:1.5px solid var(--line)}
  .btn.sm{padding:6px 13px;font-size:13px}
  .row{display:flex;gap:12px;align-items:flex-end;flex-wrap:wrap}
  table{width:100%;border-collapse:collapse;font-size:13.5px}
  th{background:var(--navy);color:#fff;text-align:left;padding:9px 11px;font-weight:600;font-size:12px}
  td{padding:9px 11px;border-bottom:1px solid var(--line);font-size:12px}
  .hl,tr.hl>td{background:#FFE08A !important;animation:hlf 1.6s ease 2}
  div.hl{box-shadow:0 0 0 3px #C0392B;border-radius:6px}
  @keyframes hlf{0%,50%{background:#FFD24D}100%{background:#FFE08A}}
  .tblwrap{max-height:60vh;overflow:auto;border:1px solid var(--line);border-radius:8px}
  .tblwrap thead th{position:sticky;top:0;z-index:3}
  tr:nth-child(even) td{background:var(--light)}
  .pill{display:inline-block;padding:2px 9px;border-radius:11px;font-size:11.5px;font-weight:600}
  .pill.ok{background:#e6f4ec;color:var(--green)}.pill.ng{background:var(--redbg);color:var(--red)}
  .pill.dc{background:#e3f0f2;color:var(--teal)}.pill.pk{background:#e9eefa;color:var(--blue)}
  .pill.os{background:#ede6f5;color:var(--purple)}
  .badge{font-family:Consolas,monospace;background:var(--navy);color:#fff;padding:3px 9px;border-radius:5px;font-size:13px;letter-spacing:.5px;white-space:nowrap}
  .muted{color:var(--muted)}.small{font-size:12px}
  .empty{color:var(--muted);text-align:center;padding:26px;font-size:13.5px}
  .note{background:var(--goldbg);border-left:4px solid var(--gold);padding:11px 14px;border-radius:6px;font-size:12.5px;margin-bottom:16px}
  /* 84-5 標籤＝直式 寬60mm×高80mm（使用者定案）＝原本樣式（深藍表頭卡）＋Code 128（值靠左、每欄獨立一列、含 CID 列） */
  .lblcard{border:1.5px solid var(--navy);border-radius:2.5mm;width:60mm;height:80mm;background:#fff;box-sizing:border-box;display:flex;flex-direction:column;overflow:hidden}
  .lblcard .hd{display:flex;justify-content:space-between;align-items:center;background:var(--navy);padding:2.2mm 3mm;flex:0 0 auto}
  .lblcard .hd b{color:#fff;font-size:10.5pt}
  .lblcard .hd .small{font-size:8pt;color:#CFD8EA}
  /* 84-6 字體加大（好查看）：欄名9pt/值10pt；LOT·階段料號長字串8pt(.sm)；CID·QTY 重點加粗10.5pt(.big)；條碼確實置中 */
  .lblbody{padding:1.2mm 3mm 0;display:flex;flex-direction:column;flex:1 1 auto;min-height:0}
  .lblrow{display:flex;align-items:baseline;font-size:9pt;line-height:1.25;padding:.7mm 0}
  .lblrow span{color:#555;white-space:nowrap}
  .lblrow span:first-child{flex:0 0 15mm}
  .lblrow b{font-family:Consolas,monospace;font-size:10pt;text-align:left;white-space:nowrap}
  .lblrow b.sm{font-size:8pt}
  .lblrow b.big{font-size:10.5pt;font-weight:800}
  .lblrow b.wr{white-space:normal;line-height:1.15;font-size:9.5pt}
  .barwrap{margin-top:auto;text-align:center;padding:1mm 0 2mm}
  .barwrap svg{width:100%;max-width:52mm;height:11mm;display:block;margin:0 auto}
  .barid{font-family:Consolas,monospace;font-size:10pt;letter-spacing:1px}
  .qrwrap{display:flex;gap:16px;align-items:center;margin-top:12px}
  #qrbox img,#qrbox canvas,.qrbox img,.qrbox canvas{border:1px solid var(--line);border-radius:6px}
  /* A2 列印標籤浮層：多張標籤排版＋只印標籤 */
  #printOverlay{display:none;position:fixed;inset:0;background:rgba(15,25,45,.55);z-index:200;overflow:auto;padding:20px}
  #printOverlay .po-bar{position:sticky;top:0;display:flex;justify-content:space-between;align-items:center;gap:10px;background:#fff;border:1px solid var(--line);border-radius:9px;padding:10px 14px;margin:0 auto 14px;max-width:920px;box-shadow:0 2px 12px rgba(0,0,0,.18)}
  #printOverlay .po-labels{display:flex;flex-wrap:wrap;gap:14px;justify-content:center;max-width:920px;margin:0 auto}
  @media print{
    /* 84-3 只留浮層：改用「除了 #printOverlay 全部隱藏」——topbar/語言鈕先前沒被舊清單蓋到，印出來疊在標籤上 */
    body.printing>*:not(#printOverlay){display:none!important}
    body.printing #printOverlay{position:static;background:#fff;padding:0;display:block!important;overflow:visible;zoom:1!important}
    /* ↑ zoom:1!important：84-1 給浮層的螢幕抵銷(1/z, inline)在列印時要強制歸一，否則 body=1 × 浮層0.7 → 標籤縮小錯位 */
    body.printing #printOverlay .po-bar{display:none!important}
    #printOverlay .po-labels{display:block;max-width:none}
    #printOverlay .lblcard{break-inside:avoid;page-break-inside:avoid;page-break-after:always;margin:0}
    @page{size:60mm 80mm;margin:0}   /* 84-5 直式：一箱一頁；標籤機驅動選 寬60×高80 紙張即可（跟一般列印一樣選印表機） */
    body.printing{zoom:1!important}  /* 84-1 ★body zoom 三坑+1：等比縮放(fitScale 1~1.7)連 mm 實體尺寸一起放大→列印超出 80×60，列印時強制歸一 */
  }
  .chip{display:inline-block;background:var(--light);border:1px solid var(--line);padding:5px 10px;border-radius:7px;margin:3px 4px 3px 0;font-size:13px;cursor:pointer}
  .chip.sel{background:var(--teal);color:#fff;border-color:var(--teal)}
  .step{font-size:12px;color:var(--muted);margin-bottom:4px}
  .flow{display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin:8px 0}
  .flow .st{background:var(--light);border:1px solid var(--line);border-radius:6px;padding:5px 11px;font-size:12.5px;font-weight:600}
  .flow .st.done{background:var(--teal);color:#fff;border-color:var(--teal)}
  .flow .st.now{background:var(--gold);color:#fff;border-color:var(--gold)}
  .flow .ar{color:var(--muted)}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--navy);color:#fff;padding:13px 24px;border-radius:9px;
    box-shadow:0 6px 22px rgba(0,0,0,.25);font-size:14.5px;opacity:0;transition:.25s;z-index:99;pointer-events:none;max-width:80vw}
  .toast.show{opacity:1;bottom:34px}.toast.err{background:var(--red)}.toast.ok{background:var(--green)}
  .kpi{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:10px 16px}
  .kpi .v{font-size:28px;font-weight:700;color:var(--navy);line-height:1.15}
  .kpi .l{font-size:12px;color:var(--muted);margin-top:1px;white-space:nowrap}
  .trace-node{border-left:3px solid var(--teal);padding:10px 14px;margin:8px 0 8px 6px;background:var(--light);border-radius:0 8px 8px 0}
  .trace-matrix{min-width:600px}
  .trace-matrix th,.trace-matrix td{border:1px solid var(--line);padding:8px 10px;font-size:13px;white-space:nowrap}
  .trace-matrix thead th{background:var(--navy);color:#fff}
  .trace-node .cid{font-family:Consolas,monospace;font-weight:700;color:var(--navy)}
  .src{font-size:12px;color:var(--muted);margin-top:3px}
  .wipbar{height:8px;background:var(--line);border-radius:4px;overflow:hidden;min-width:80px}
  .wipbar i{display:block;height:100%;background:var(--teal)}
  /* ===== 階段1：登入畫面（email＋密碼；不做廠區下拉——廠區/權限本來就在 profile 裡） ===== */
  #login-screen{position:fixed;inset:0;z-index:300;overflow:auto;padding:20px;
    background:linear-gradient(135deg,var(--navy) 0%,var(--navy2) 55%,#0e1c33 100%);
    display:flex;align-items:center;justify-content:center}
  .lgcard{background:#fff;border-radius:14px;padding:32px 30px;width:100%;max-width:392px;box-shadow:0 18px 50px rgba(0,0,0,.38)}
  /* 登入頁品牌區：結構比照 QMS —— ① 公司 LOGO ② 系統代號＋中文名 ③ 英文副標 */
  .lgbrand{text-align:center;margin-bottom:20px}
  .lgbrand img{max-width:200px;height:auto;display:block;margin:0 auto}
  .lgbrand .lgtitle{font-size:22px;font-weight:700;color:var(--navy);letter-spacing:.02em;margin-top:12px}
  .lgbrand .lgsub{font-size:12px;color:#888;margin-top:4px}
  #login-screen label{margin-top:12px}
  .lgerr{background:var(--redbg);border-left:4px solid var(--red);color:var(--red);padding:9px 12px;border-radius:6px;font-size:13px;margin-bottom:6px}
  .lghint{font-size:11.5px;color:var(--muted);margin-top:10px;line-height:1.65}
  /* 管理員捷徑：只帶入 email，密碼照樣要打（比照 QMS 的 ADMIN_EMAIL 寫死做法） */
  .lgadmin{margin-top:10px;text-align:center}
  .lgadmin a{display:inline-block;font-size:12px;color:var(--navy);background:var(--light);border:1px solid var(--line);
    border-radius:7px;padding:6px 12px;cursor:pointer;text-decoration:none;font-weight:600}
  .lgadmin a:hover{background:#e9eefa;border-color:var(--blue)}
  .lgfoot{margin-top:18px;padding-top:14px;border-top:1px solid var(--line);text-align:center;font-size:12px}
  .lgfoot a{color:var(--teal);text-decoration:none;cursor:pointer}
  .lgfoot a:hover{text-decoration:underline}
</style>
</head>
<body>
<!-- ★ 階段1：登入畫面。未登入時擋住整個系統；登入成功才顯示 .app -->
<div id="login-screen">

<script>
/* =====================================================================
   MHR 雛形 v06 — 製程流轉（部分領用 / 結存遞減 / 接力併箱 / OK·NR·NG）
   設計重點（依大永現場與 BM04 日報表）：
   - 不做倉別進出庫，只記「線邊過站轉入(領料)/轉出(出庫)/結存」
   - 來源箱可分次部分領用，剩料留原箱、箱號不變、結存遞減
   - 下一站可開新箱，或併入既有尚未轉出的箱（接力產出）
   - 來源關聯帶數量：A箱領200 + B箱領100 → 可追回
   - 不良分 OK / NR(可重工) / NG(報廢)；NR 先只記量，重工回流待確認
   - 不碰：倉別、SO/出貨/過帳/營收、品保會簽、重工工單（屬 ERP/WOC）
   正式版改接 Supabase：替換 db.load/db.save 即可，畫面不動。
   ★3a-1（260720）：①質控欄（per 站「需記質控」開關，預設全開；開了必填＝沒人驗不能裝箱；OK/NR/NG 各箱記同一質控人）
     ②現場點選強化（名單改工牌名單依職能過濾／本裝置記住上次作業員／大字顯示防選錯）③「本班質控」自動帶（人×班別×日期，跨日換班失效）
     ④標籤加 OP 作業員／QC 質控 兩列（箱子本身就是簽名）。接收點交／帳差＝3a-2。
   ★3a-2（260720）：新增「接收點交」頁（03，後面順移）——A 嚴格：報工/進爐來源限「已接收」；
     連掃多箱、接收站自動判定（路線下一站）、實收預設＝應收、帳差時箱數量改實收＋責任歸屬（前站預設/後站）；
     委外站自動轉「轉出」點交（回廠不點交＝委外報工記）；烤漆補噴 NR 箱豁免；點交人＝登入者；
     點交事件寫 reports(type:'handover')；舊資料/測試資料一次性視同已接收。
   ★3a-2b（260720，依大永現場回報）：標籤改 80×60mm 實體尺寸＋條碼改 Code 128（掃描器只認一維、讀不到 QR；
     現場 BarTender 同款 Code 128）。條碼內容仍只編箱號 CID（鑰匙）；@page 80×60 一箱一頁，標籤機驅動直接列印。
   ★84-12（260721）：3a-3 回歸 31 項代跑後修正——報工分箱紙箱補 oqc:'待OQC'（原僅烤漆路徑有）。其餘 30 項全過。
   ★85-1（260722）：①機台主檔上雲＝雲端為正本（mhr_machines 表，比照工牌名單 RLS 直讀寫；
     大永真實 25 台＋敬得 15 台由 SQL 灌入，code 內 demo 機台 seed 廢止）＋機台加「廠牌/型號/對應料號」欄；
     ②名單管理欄位照 OMS 資料：新欄序 廠區｜姓名｜Email｜角色｜…，廠區＝OMS factory_code（自建帳號＝勾選廠區），
     姓名優先顯示 OMS 名字；③角色順序統一（85）：品保/物控排作業員前。
   ★84-11（260721）：掃碼保證接收——①全頁掃碼攔截（接收/報工兩頁：焦點不在輸入框時，
     高速字串+Enter=掃描槍特徵 → 自動導入箱號欄並觸發），掃了必被接住 ②接收頁進頁自動聚焦輸入框。
   ★84-10（260721，使用者需求）：多角色兼任——大永人力有限，生產+物控／物控+質控可同一人。
     mhr_profiles 加 mhr_roles text[]（主角色 mhr_role=第一個勾選，顯示用）；權限=各角色聯集（perm() 改 ROLES map join）；
     名單管理角色改複選 chips。需配套：SQL `MHR_3a2c_多角色兼任_260721_CODE.sql`＋EF 重佈署（260721_多角色版，允許 mhr_roles）。
   ★84-5（260721，使用者定案）：標籤改「直式 寬60mm×高80mm」＝原本樣式（深藍表頭卡、每欄獨立一列、含 CID 列），
     @page 60×80 一箱一頁；品名可換行、其餘單行；條碼 52mm 寬置底。
   ★84-1（260721，使用者補印實測回饋）：①標籤值靠左（欄名固定 20mm，值不再甩到最右）
     ②列印縮放修正——body 等比縮放 zoom(fitScale 1~1.7) 會連 mm 實體尺寸一起放大→補印超出 80×60：
       列印時 body.printing 強制 zoom:1、浮層以 1/z 抵銷 → 螢幕預覽與印出皆為真實尺寸。
   ===================================================================== */
const DB_KEY='mhr_proto_v6o';
const db={ data:{products:[],containers:[],reports:[]},
  load(){ try{ const r=localStorage.getItem(DB_KEY); if(r){ this.data=JSON.parse(r); this.data.reports=this.data.reports||[]; } }catch(e){} },
  save(){ localStorage.setItem(DB_KEY, JSON.stringify(this.data)); } };
db.load();
/* 一次性資料修正：舊 localStorage 的 機種 Mini2 Kickstand→MINI2、品名去掉(STARLINK)、批號 Mini2Kickstand→MINI2 */
(function migrateData(){ let ch=false;
  (db.data.products||[]).forEach(p=>{ if(p.model==='Mini2 Kickstand'){p.model='MINI2';ch=true;} if(p.name&&p.name.indexOf('(STARLINK)')>=0){p.name=p.name.replace(/\s*\(STARLINK\)\s*/,' ').replace(/\s{2,}/g,' ').trim();ch=true;} });
  (db.data.containers||[]).forEach(c=>{ if(c.lot&&c.lot.indexOf('Mini2Kickstand')>=0){c.lot=c.lot.replace(/Mini2Kickstand/g,'MINI2');ch=true;} });
  (db.data.reports||[]).forEach(r=>{ if(r.lot&&r.lot.indexOf('Mini2Kickstand')>=0){r.lot=r.lot.replace(/Mini2Kickstand/g,'MINI2');ch=true;} });
  if(ch) db.save();
})();

/* 製程主檔（信錦標準）：cat=類別、local=局部範圍、legacy=舊資料相容(不可選)。
   委外不是製程屬性（同一製程不同產品可能內製或委外），改由產品路線上「每站可勾選委外」，存在 product.os=[站碼]。
   產品路線只能從本主檔挑，使用者不能自訂名稱。 */
const STATIONS=[
  {code:'DC', zh:'壓鑄', en:'Die Casting',    vn:'Đúc',            cat:'成型加工', alias:['壓鑄','成型','沖壓','沖剪','壓鑄+沖壓']},
  {code:'CN', zh:'機加', en:'CNC',            vn:'Gia công CNC',   cat:'成型加工', alias:['機加','CNC','機械加工','NCT','機加1','機加2']},

/* 到站高亮：跨頁帶高亮目標，目標頁渲染後把對應元素(data-hl)標底色＋捲到中央＋閃爍 */
function setHL(type,val,focus){ window._hl={type,val,focus:focus||''}; }
function setHLCells(cids,focus){ window._hl={cids:(cids||[]).filter(Boolean),focus:focus||''}; }
function applyHL(){ const hl=window._hl; if(!hl) return; const run=(tries)=>{ document.querySelectorAll('.hl').forEach(e=>e.classList.remove('hl')); let first=null;
  if(hl.cids){ document.querySelectorAll('[data-cid]').forEach(el=>{ if(hl.cids.indexOf(el.getAttribute('data-cid'))<0) return; if(hl.focus && el.getAttribute('data-focus')!==hl.focus) return; el.classList.add('hl'); if(!first)first=el; }); }
  else { document.querySelectorAll('[data-hl]').forEach(el=>{ if(el.getAttribute('data-hl')!==hl.type+':'+hl.val) return; const f=el.getAttribute('data-focus')||''; if(hl.focus? f===hl.focus : !f){ el.classList.add('hl'); if(!first)first=el; } }); }
  if(first){ window._hl=null; if(first.scrollIntoView)first.scrollIntoView({block:'center',behavior:'smooth'}); } else if(tries>0){ setTimeout(()=>run(tries-1),250); } }; setTimeout(()=>run(4),120); }

/* 委外：依產品路線上的勾選(product.os=[站碼])判斷某產品某站是否委外 */
function isOS(pn,code){ const p=prodOf(pn); return !!(p&&p.os&&p.os.indexOf(code)>=0); }

/* 帶數量的來源關聯：每個箱 sources=[{cid,take}]；結存=qty-已被下游領走 */
function drawnOut(cid){ let s=0; db.data.containers.forEach(c=>(c.sources||[]).forEach(d=>{ if(d.cid===cid) s+=(+d.take||0); })); return s; }
function remaining(cid){ const c=findC(cid); if(!c) return 0; return (+c.qty||0)-drawnOut(cid); }
function isWIP(c){ return remaining(c.cid)>0; }
/* ===== 3a-2 接收（點交）＝A 嚴格：報工只能投「本站已接收」的箱 =====
   箱.received={station,by,at,expect,actual,diff,resp,note,kind:'receive'|'sendout'}＝最近一次點交快照；
   點交事件另寫入 reports(type:'handover') 留完整歷史。點交不產新箱、不動批號；帳差時箱數量改為實收。
   豁免：烤漆補噴 NR 箱（沒離站）。首站建箱不領料、不受影響。 */
function isReceived(c){ return !!(c&&c.received&&c.received.station); }
function needReceive(c){ if(!c) return false; if(c.kind==='NR'&&c.paintRepair) return false; return true; }
function canDraw(c){ return !needReceive(c)||isReceived(c); }
/* 同一批(機種+批號)、同一站，依建立時間排序，回傳「第n次 / 共m次」入庫 */
function batchSeq(c){
  const grp=db.data.containers.filter(x=>isNormalBox(x)&&x.partNo===c.partNo&&x.lot===c.lot&&x.processCode===c.processCode)
    .slice().sort((a,b)=>String(a.createdAt).localeCompare(String(b.createdAt)));
  const n=grp.findIndex(x=>x.cid===c.cid)+1; return {n,m:grp.length};
}
function seqTag(c){ const s=batchSeq(c); const day=(c.createdAt||'').slice(5,10).replace('-','/');
  return s.m>1?`<span class="seq">第${s.n}/${s.m}次入庫 ${day}</span>`:''; }
/* ===== QMS 串接（示意）：用 Container ID 連結 QMS 檢驗報告。
   正式版改為以箱號向 QMS API/Table 查詢；此處用箱號雜湊產生穩定示意資料，
   讓追溯時可同時看到「MHR 數量 + QMS 檢驗」串在一起的樣貌。 ===== */
function qmsInspType(code,pn){
  if(code==='DC') return 'IPQC 首件';            // 壓鑄首件
  if(code==='AS'||code==='PK') return 'OQC 出貨檢驗';
  if(isOS(pn,code)) return 'IQC 委外進貨檢驗';
  return 'IPQC 製程檢驗';
}
function qmsReport(c){
  // 以箱號產生穩定亂數(0-99)
  let h=0; for(const ch of c.cid) h=(h*31+ch.charCodeAt(0))%1000;
  const fail = (c.ngHolder)|| (h%17===0);          // 少數條件允收，示意
  const dim=(9.95+ (h%10)/100).toFixed(2);          // 量測示意 9.95~10.04
  const tol='10.00 ±0.05';
  const within = Math.abs(parseFloat(dim)-10.00)<=0.05;
  return {
    type:qmsInspType(c.processCode,c.partNo),
    result: within?'PASS 允收':'條件允收(待判)',
    dim, tol, within,
    reportNo:'QC-'+c.cid,
    inspector:['品保 阮','品保 陳','品保 Lan'][h%3]
  };
}
function qmsBadge(c){ const q=qmsReport(c);
  const color=q.within?'#1f8a4c':'#b9760f'; const bg=q.within?'#e6f4ec':'#fef0dd';
  return `<span class="qms" style="background:${bg};color:${color}">QMS ${esc(q.type)}：${esc(q.result)} ｜ 量測 ${q.dim}（規格 ${q.tol}）</span>`;
}

let LANG=(function(){try{return localStorage.getItem('mhr_lang')||'EN';}catch(e){return 'EN';}})();
function secOf(zh){ const e=I18N[zh]; if(!e) return ''; return (LANG==='VN'?e.vn:e.en)||''; }
function L(zh){ const sec=secOf(zh); return sec? zh+'<span class="sec">'+sec+'</span>' : zh; }
function Lt(zh){ const sec=secOf(zh); return sec? zh+' '+sec : zh; }
function stSec(o){ const x=(LANG==='VN'?o.vn:o.en); return x?' '+x:''; }
function stN(code){ if(code&&code.indexOf('+')>=0) return code.split('+').map(c=>stN(c)).join('＋'); const o=stOf(code); return o.zh+stSec(o); }
function stNo(o){ return o.zh+stSec(o); }
function setLang(l){ LANG=l; try{localStorage.setItem('mhr_lang',l);}catch(e){} renderLangBar(); renderNav(); render(); }

function toast(msg,type){ const t=$('#toast'); t.className='toast show '+(type||''); t.textContent=msg; setTimeout(()=>t.className='toast',2600); }
function todayYMD(){ const d=new Date(); return String(d.getFullYear()).slice(2)+String(d.getMonth()+1).padStart(2,'0')+String(d.getDate()).padStart(2,'0'); }
function genCID(code){ const pre=(code||'').split('+')[0]+todayYMD(); const n=db.data.containers.filter(c=>c.cid&&c.cid.startsWith(pre)).length+1; return pre+String(n).padStart(4,'0'); }
function findC(cid){ return db.data.containers.find(c=>c.cid===cid); }
/* ===== 不良品 / 重工：核心模型 =====
   不良箱＝紅色容器(kind:NR/NG)，批+站一個、累加、sources 帶來源箱（結存可追）。
   NR=可重工(待會判/待重工)；NG=報廢(報工直接判廢 + 重工失敗轉入)。
   回流箱＝kind 空白的正常 OK 箱，但 workType='rework'/'release'，sources 指向 NR 箱。 */
function isDefect(c){ return !!(c&&(c.kind==='NR'||c.kind==='NG')); }
function isNormalBox(c){ return !!(c&&!c.ngHolder&&!isDefect(c)); }
function nowISO(){ return new Date().toISOString(); }
// 不良箱號：類型-站碼-YYMMDD-序（一眼看出 哪種不良＋哪一站）
function genDefCID(kind,code){ const pre=kind+'-'+(code||'').split('+')[0]+'-'+todayYMD()+'-'; const n=db.data.containers.filter(c=>c.cid&&c.cid.indexOf(pre)===0).length+1; return pre+String(n).padStart(3,'0'); }
// 把領料量依序切給 OK/NR/NG，每個來源箱只被計一次 → 源箱結存才正確
function splitDraws(draws,amounts){ const pool=draws.map(d=>({cid:d.cid,left:+d.take||0}));
  return amounts.map(amt=>{ let need=+amt||0; const out=[]; for(const p of pool){ if(need<=0)break; if(p.left<=0)continue; const t=Math.min(p.left,need); p.left-=t; need-=t; out.push({cid:p.cid,take:t}); } return out; }); }
// 報工不良 → 產生/累加 NR 不良箱 或 NG 報廢箱（批+站一個、累加）
function addDefect(kind,station,first,drawsForKind,meta){ meta=meta||{}; const add=drawsForKind.reduce((a,d)=>a+(+d.take||0),0); if(add<=0) return null;
  let b=db.data.containers.find(c=>c.kind===kind&&c.lot===first.lot&&c.processCode===station&&c.partNo===first.partNo);
  if(b){ b.qty+=add; b.sources.push(...drawsForKind); if(!b.qc&&meta.qc) b.qc=meta.qc; }
  else { b={cid:genDefCID(kind,station),partNo:first.partNo,name:first.name,lot:first.lot,orderNo:first.orderNo,
      processCode:station,stagePartNo:stageNo(first.partNo,station),qty:add,kind,
      operator:meta.op||'',qc:meta.qc||'',machine:meta.mc||'',shift:meta.shift||'',vendor:meta.vendor||'',
      sources:drawsForKind.slice(),disp:[],createdAt:meta.createdAt||nowISO()};
    db.data.containers.push(b); }
  return b.cid; }
// 會判處置：對 NR 不良箱結存做 重工回流 / 報廢 / 改判放行（重工＋NG 皆從 NR 箱領出，扣其結存）
function reworkDispose(nrCid,reworkOK,scrapNG,releaseOK,reworkOrder,judgeSrc,judge,createdAt,reworkStation){
  const nb=findC(nrCid); if(!nb||nb.kind!=='NR') return false; const rem=remaining(nrCid);
  reworkOK=+reworkOK||0; scrapNG=+scrapNG||0; releaseOK=+releaseOK||0;
  if(reworkOK+scrapNG+releaseOK<=0) return false;
  if(reworkOK+scrapNG+releaseOK>rem) return false;
  const at=createdAt||nowISO();
  const rwSt=reworkStation||nb.processCode;   // 重工去向製程（會判依不良狀況指定；預設原站）
  // 回流 OK 箱在指定製程產生 → 再依路線往下流（rework＝重工去向站；release 放行＝回原站續流）
  const mkOK=(qty,wt,ord,st)=>{ db.data.containers.push({cid:genCID(st),partNo:nb.partNo,name:nb.name,lot:nb.lot,
    orderNo:ord||nb.orderNo,processCode:st,stagePartNo:stageNo(nb.partNo,st),qty,operator:judge||'',
    machine:wt==='rework'?'重工':'',shift:'',workType:wt,reworkOrder:ord||'',reworkFrom:nb.processCode,sources:[{cid:nrCid,take:qty}],createdAt:at}); };
  if(reworkOK>0) mkOK(reworkOK,'rework',reworkOrder||'',rwSt);
  if(releaseOK>0) mkOK(releaseOK,'release','',nb.processCode);
  if(scrapNG>0) addDefect('NG',nb.processCode,nb,[{cid:nrCid,take:scrapNG}],{op:judge||'',createdAt:at});
  (nb.disp=nb.disp||[]).push({reworkOK,scrapNG,releaseOK,reworkOrder:reworkOrder||'',reworkStation:reworkOK>0?rwSt:'',judgeSrc:judgeSrc||'',judge:judge||'',at});
  return true; }

/* ===== 站別產出帳：產出(OK) / 已轉下站 / 結存(在庫) / NR / NG ===== */
function stationLedger(pn){
  const led={};
  const g=code=>led[code]||(led[code]={input:0,out:0,moved:0,stock:0,boxes:0,nr:0,ng:0});
  db.data.containers.forEach(c=>{ if(pn&&c.partNo!==pn) return; if(!isNormalBox(c)) return;
    const w=g(c.processCode); const mv=drawnOut(c.cid); const rem=(+c.qty||0)-mv;
    w.out+=(+c.qty||0); w.moved+=mv; w.stock+=rem; if(rem>0) w.boxes++; });
  db.data.reports.forEach(r=>{ if(pn&&r.partNo!==pn) return; const w=g(r.toStation);
    w.nr+=(+r.nr||0); w.ng+=(+r.ng||0); w.input+=(r.draws||[]).reduce((a,d)=>a+(+d.take||0),0); });
  return led;
}

function matchStation(text){ let best=null,bl=0; for(const s of STATIONS){ if(s.legacy) continue; for(const a of (s.alias||[s.zh])){ if(a&&text.includes(a)&&a.length>bl){best=s;bl=a.length;} } } return best; }
function parseBOM(){
  const txt=$('#bom_txt').value.trim(); if(!txt) return toast('請先貼上 BOM','err');
  const lines=txt.split(/\r?\n/).map(l=>l.trim()).filter(Boolean); const route=[],stages={},unknown=[];
  lines.forEach(l=>{ const m=l.match(/[A-Za-z0-9]+\.[A-Za-z0-9.\-]+/); const name=(m?l.replace(m[0],''):l); const st=matchStation(name);
    if(!st){ unknown.push(l); return; } if(!route.includes(st.code)) route.push(st.code); if(m) stages[st.code]=m[0]; });
  renderBomUnknown(unknown);
  if(!route.length) return toast('沒有對到任何主檔製程，請改用主檔內的製程名稱','err');
  window._route=route; window._stages=stages; syncRouteUI();
  toast(unknown.length?('已套用 '+route.length+' 站；'+unknown.length+' 行對不到主檔、已略過'):('已套用 '+route.length+' 站'), unknown.length?'err':'ok');
}

function captureStages(){ window._route.forEach(c=>{ const el=document.getElementById('stage_'+c); if(el) window._stages[c]=el.value.trim(); }); }
function moveStage(code,dir){ captureStages(); const r=window._route,i=r.indexOf(code),j=i+dir; if(i<0||j<0||j>=r.length) return; const t=r[i]; r[i]=r[j]; r[j]=t; syncRouteUI(); }
function toggleOS(code){ captureStages(); const i=window._os.indexOf(code); if(i>=0)window._os.splice(i,1); else window._os.push(code); syncRouteUI(); }
/* 合併工站：把第 idx 步併入上一步（形成 A+B 一個工站）；拆開則還原 */
function mergeUp(idx){ captureStages(); const r=window._route; if(idx<=0||idx>=r.length) return; const a=r[idx-1],b=r[idx],merged=a+'+'+b;
  const wasOS=window._os.includes(a)||window._os.includes(b); window._os=window._os.filter(x=>x!==a&&x!==b); if(wasOS)window._os.push(merged);
  const st=window._stages[a]||window._stages[b]||''; delete window._stages[a]; delete window._stages[b]; if(st)window._stages[merged]=st;
  r.splice(idx-1,2,merged); syncRouteUI(); }
function splitStep(idx){ captureStages(); const r=window._route,c=r[idx]; if(!c||c.indexOf('+')<0) return; const parts=c.split('+');
  const wasOS=window._os.includes(c); window._os=window._os.filter(x=>x!==c); if(wasOS)parts.forEach(p=>window._os.push(p));
  const st=window._stages[c]; delete window._stages[c]; if(st)window._stages[parts[0]]=st;
  r.splice(idx,1,...parts); syncRouteUI(); }
function addProd(){
  const pnIn=$('#p_pn').value.trim(),cu=($('#p_cu')?$('#p_cu').value.trim():''),nm=$('#p_nm').value.trim(),md=($('#p_model')?$('#p_model').value.trim():'');
  if(!md) return toast('請輸入機種','err'); if(!window._route.length) return toast('請至少選一站','err');
  const pn=pnIn||md; // 唯一鍵：有料號用料號、無則用機種
  captureStages(); const stages={}; window._route.forEach(c=>{ if(window._stages[c]) stages[c]=window._stages[c]; });
  const os=window._os.filter(c=>window._route.indexOf(c)>=0);
  const orig=window._editPnOrig||''; const obj={partNo:pn,model:md,name:nm,customer:cu,site:($('#p_site')?$('#p_site').value:''),route:window._route.slice(),stages,os};
  if(db.data.products.some(p=>p.partNo===pn && p.partNo!==orig)) return toast(pnIn?'料號已存在':'此機種已存在，要建多個請填料號區分','err');
  if(orig){ const idx=db.data.products.findIndex(p=>p.partNo===orig); if(idx>=0) db.data.products[idx]=obj; else db.data.products.push(obj);
    if(orig!==pn){ // 料號改名：連動更新箱號/工單/模具的引用，避免孤兒
      db.data.containers.forEach(c=>{ if(c.partNo===orig) c.partNo=pn; });
      const oo=getOrders(); let c1=false; oo.forEach(o=>{ if(o.partNo===orig){o.partNo=pn;c1=true;} }); if(c1) saveOrders(oo);
      const mm=getMolds(); let c2=false; mm.forEach(m=>{ if(m.partNo===orig){m.partNo=pn;c2=true;} }); if(c2) saveMolds(mm);
    }
  } else { const ex=db.data.products.findIndex(p=>p.partNo===pn); if(ex>=0) db.data.products[ex]=obj; else db.data.products.push(obj); }
  window._editPnOrig=''; db.save(); toast(orig?'已更新':'已新增','ok'); renderProd();
}
function editProd(i){ const p=db.data.products[i]; if(!p) return; window._editPnOrig=p.partNo||''; $('#p_pn').value=(p.partNo&&p.partNo!==(p.model||'')?p.partNo:''); if($('#p_model'))$('#p_model').value=p.model||p.partNo||''; if($('#p_cu'))$('#p_cu').value=p.customer||''; if($('#p_site'))$('#p_site').value=p.site||''; $('#p_nm').value=p.name||''; window._route=(p.route||[]).slice(); window._stages=Object.assign({},p.stages||{}); window._os=(p.os||[]).slice(); syncRouteUI(); if(window.scrollTo)window.scrollTo(0,0); toast('已載入「'+p.partNo+'」，可改料號（會連動箱號/工單/模具）','ok'); }
function delProd(i){ if(confirm('刪除此產品？')){ db.data.products.splice(i,1); db.save(); renderProd(); } }
function prodRowsHTML(){ const q=(($('#prod_q')||{}).value||'').trim().toLowerCase(); const fc=(($('#prod_fcust')||{}).value||''); const fm=(($('#prod_fmodel')||{}).value||''); const fs=(($('#prod_fsite')||{}).value||'');
  const rows=db.data.products.map((p,i)=>({p,i})).filter(({p})=> (!fs||p.site===fs) && (!fc||p.customer===fc) && (!fm||(p.model||p.partNo)===fm) && (!q||((p.partNo||'')+' '+(p.model||'')+' '+(p.name||'')+' '+(p.customer||'')+' '+(p.site||'')).toLowerCase().includes(q)) );
  if(!rows.length) return `<tr><td colspan="7"><div class="empty" style="padding:14px">查無符合條件</div></td></tr>`;
  return rows.map(({p,i})=>`<tr><td>${p.site?'<span class="pill dc">'+esc(p.site)+'</span>':'<span class="muted">未設</span>'}</td><td>${p.customer?esc(p.customer):'<span class="muted">—</span>'}</td><td>${p.model?esc(p.model):'<span class="muted">—</span>'}</td><td class="mono">${pnoOf(p.partNo)?'<b>'+esc(pnoOf(p.partNo))+'</b>':'<span class="muted">—</span>'}</td><td>${esc(p.name||'')}</td><td>${routeListHTML(p)}</td><td style="white-space:nowrap">${can('prod','e')?`<button class="btn ghost sm" onclick="editProd(${i})">編輯</button> `:''}${can('prod','d')?`<button class="btn gray sm" onclick="delProd(${i})">${L('刪除')}</button>`:''}${(!can('prod','e')&&!can('prod','d'))?'<span class="muted small">唯讀</span>':''}</td></tr>`).join('');
}

        <div id="u_roles">${(()=>{ const cur=(Array.isArray(p.mhr_roles)&&p.mhr_roles.length)?p.mhr_roles:[p.mhr_role||'view'];
          return ROLES_DEF.map(r=>`<label class="chip" style="font-weight:400;color:var(--ink)"><input type="checkbox" value="${r.key}"${cur.includes(r.key)?' checked':''} style="width:auto;margin-right:5px;vertical-align:-1px">${r.label}</label>`).join(''); })()}</div></div>

    site_codes: at==='site'? [...document.querySelectorAll('#u_sites input:checked')].map(x=>x.value) : [],
    bu_codes:   at==='site'? [...document.querySelectorAll('#u_bus input:checked')].map(x=>x.value)   : [],
    vendor_code: at==='vendor'? ($('#u_vendor').value||null) : null };
}

function opEdit(id){ const o=MHR_OPS.find(x=>String(x.id)===String(id)); if(!o) return;
  window._opEdit=Object.assign({},o,{belong:opBelongOf(o),isNew:false}); render(); if(window.scrollTo)window.scrollTo(0,0); }
function opFromOms(emp){ const u=OMS_USERS.find(x=>x.emp_id===emp); if(!u) return;
  const st=MHR_SITES.find(s=>s.code===u.factory_code);
  window._opEdit=Object.assign(opBlank(),{badge:u.emp_id,emp_id:u.emp_id,name:u.name||'',eng_name:u.eng_name||'',
    belong:st?st.code:'',source:'oms'});
  render(); if(window.scrollTo)window.scrollTo(0,0); }
async function opSave(){
  const e=window._opEdit; if(!e) return;
  const badge=($('#op_badge').value||'').trim(), name=($('#op_name').value||'').trim();
  const belong=$('#op_belong').value, funcs=readChecks('op_funcs');
  if(!badge) return toast('請填工牌號','err');
  if(!name)  return toast('請填姓名','err');
  if(!belong) return toast('請選「屬於」哪個廠區/廠商','err');
  if(!funcs.length) return toast('請至少勾一個職能，否則掃工牌時不會跳出這個人','err');
  if(e.isNew && MHR_OPS.some(o=>o.badge===badge)) return toast('工牌號「'+badge+'」已存在','err');
  const st=MHR_SITES.find(s=>s.code===belong)||{};
  const row={badge,name,eng_name:($('#op_eng').value||'').trim()||null,emp_id:($('#op_emp').value||'').trim()||null,
    site_code: st.kind==='vendor'? null : belong,
    vendor_code: st.kind==='vendor'? belong : null,
    functions:funcs, source:$('#op_src').value, active:true, updated_at:new Date().toISOString()};
  const r = e.isNew ? await sbWrite('POST','mhr_operators',row)
                    : await sbWrite('PATCH','mhr_operators?id=eq.'+encodeURIComponent(e.id),row);
  if(!r.ok) return toast(r.error||'失敗','err');
  toast(e.isNew?'已新增工牌':'已儲存','ok'); window._opEdit=null; await loadOperators(); render();
}

/* 授權矩陣表身：用「底色分區」取代原本重複 8 次「操作」／6 次「設定」的文字欄。
   配色沿用製程主檔那套（每區一色＋左側色條＋色塊標題），不另外發明視覺。
   注意：權限格本身已有 permColor 底色，所以分區色只上在「頁面」欄與標題列，避免撞色。 */
const PERM_GRPS=[
  ['op' ,'操作（日常作業）','#1C7A86','#E3F0F2'],
  ['set','設定 / 管理'    ,'#6A4C93','#EDE6F5'],
];
function permMatrixBody(){
  const span=1+ROLES_DEF.length;
  return PERM_GRPS.map(([g,lbl,color,bg])=>{
    const items=PAGES.filter(p=>(p.grp||'op')===g);
    if(!items.length) return '';
    const head=`<tr><td colspan="${span}" style="background:${bg};color:${color};font-weight:700;border-left:5px solid ${color}">${lbl}<span style="font-weight:400;font-size:11px;color:var(--muted)">　（${items.length} 頁）</span></td></tr>`;
    const rows=items.map(pg=>`<tr>
      <td style="white-space:nowrap;background:${bg};border-left:5px solid ${color};font-weight:600;color:${color}">${pg.n?pg.n+' ':''}${esc(pg.label)}</td>
      ${ROLES_DEF.map(r=>{const p=(PERM[pg.id]||{})[r.key]||''; return `<td style="text-align:center;background:${permColor(p)}">${permLabel(p)}</td>`;}).join('')}
    </tr>`).join('');
    return head+rows;
  }).join('');
}

function editUser(email,isNew){
  if(isNew){
    const o=OMS_USERS.find(u=>u.email===email);
    window._editUser={email:email||'',name:o?(o.name||''):'',isNew:true,fromOms:!!o,
      account_type:'site',mhr_role:'view',mhr_roles:['view'],site_codes:[],bu_codes:[],
      source:o?'oms':'mhr'};
  } else {
    const p=MHR_USERS.find(u=>u.email===email); if(!p) return;
    window._editUser=Object.assign({},p,{isNew:false});
  }
  render(); if(window.scrollTo) window.scrollTo(0,0);
}
async function saveUser(){
  const eu=window._editUser; if(!eu) return;
  const email=($('#u_email').value||'').trim();
  const name=($('#u_name').value||'').trim();
  if(!email) return toast('請填 Email','err');
  const sc=readScope();
  if(sc.account_type==='site' && !sc.site_codes.length && !sc.bu_codes.length)
    return toast('廠區級要至少勾一個廠區或事業群，否則他登入後看不到任何資料','err');
  if(sc.account_type==='vendor' && !sc.vendor_code) return toast('請選委外廠商','err');
  const payload=Object.assign({email,name},sc,{source:eu.source||'mhr'});
  if(eu.isNew) payload.password=DEFAULT_PWD;
  toast('處理中…');
  const r=await mhrAdmin(eu.isNew?'create':'update',payload);
  if(!r.ok) return toast(r.error||'失敗','err');
  toast(r.message||'已儲存','ok');
  window._editUser=null;
  await loadMhrUsers(); render();
}

async function addMach(){

  const id=val('m_id'), proc=$('#m_proc').value, site=val('m_site');
  if(!id) return toast('請輸入機台編號','err');

  const r=await sbWrite('POST','mhr_machines',{ mach_id:id, proc:[proc], site:site||null,
    line:val('m_line')||null, ton:val('m_ton')||null, brand:val('m_brand')||null, model:val('m_model')||null, item_ref:val('m_item')||null, active:true });
  if(!r.ok) return toast(r.error||'新增失敗','err');
  toast('已新增（已存雲端）','ok'); await loadMachines(); render();
}
/* 單格編輯：line/ton/brand/model/item_ref/site 都走這裡（PATCH 雲端＋同步快取） */
async function setMachField(i,field,val){
  const m=getMachines()[i]; if(!m||!m._uuid) return;

function ordVal(o,key){ const pr=prodOf(o.partNo)||{};

  if(key==='dueDate') return o.dueDate||''; if(key==='status') return o.status||''; return ''; }
function sarr(k){ const s=window._ordSort; return (s&&s.key===k)?(s.dir>0?' ▲':' ▼'):''; }

function showOrderProg(i){ const o=getOrders()[i]; if(!o) return; const el=$('#order_prog'); if(!el) return;
  const p=prodOf(o.partNo); const route=(p&&p.route)||[];
  const boxes=db.data.containers.filter(c=>c.orderNo===o.no && c.partNo===o.partNo);
  if(window.scrollTo)window.scrollTo(0,document.body.scrollHeight);
  if(!boxes.length){ el.innerHTML=`<div class="card"><h3>📊 工單 ${esc(o.no)} · ${esc(o.partNo)} 進度</h3><div class="empty">此工單尚無建箱記錄（還沒開始生產，或建箱時沒引用此工單號）</div></div>`; return; }
  const lots=[...new Set(boxes.map(c=>c.lot).filter(Boolean))]; const last=route[route.length-1]||'';
  const bsAt=(lot,st)=>boxes.filter(c=>c.lot===lot&&c.processCode===st);
  const cellHTML=bs=>{ if(!bs.length) return '<span class="muted">—</span>'; const ok=bs.reduce((a,c)=>a+(+c.qty||0),0); const r=bs.reduce((a,c)=>a+remaining(c.cid),0); return `<b>${ok}</b>${r>0?` <span class="small" style="color:var(--teal)">在庫${r}</span>`:''}`; };
  const finOf=lot=>bsAt(lot,last).reduce((a,c)=>a+(+c.qty||0),0);
  const totalFin=lots.reduce((a,l)=>a+finOf(l),0); const tgt=+o.qty||0; const pct=tgt?Math.min(100,Math.round(totalFin/tgt*100)):0;
  const th=route.map(st=>`<th>${stN(st)}</th>`).join('');
  const rows=lots.map(lot=>`<tr><td class="mono" style="color:var(--red);font-weight:600;white-space:nowrap;cursor:pointer;text-decoration:underline" onclick="traceLot('${lot}')" title="點批號→依批號追溯整批">${esc(lot)}</td>${route.map(st=>{ const bs=bsAt(lot,st); if(!bs.length) return `<td>${cellHTML(bs)}</td>`; const oc=bs.length===1?`traceBox('${bs[0].cid}','ok')`:`traceLot('${lot}',{cids:[${bs.map(b=>"'"+b.cid+"'").join(',')}],focus:'ok'})`; const tt=bs.length===1?('追溯此箱 '+esc(bs[0].cid)):('此格 '+bs.length+' 箱合計，點看整批清單'); return `<td style="cursor:pointer" onclick="${oc}" title="${tt}">${cellHTML(bs)}${bs.length>1?` <span class="muted small">(${bs.length}箱)</span>`:''}</td>`; }).join('')}<td${finOf(lot)>0?` style="cursor:pointer" onclick="traceLot('${lot}',{cids:[${bsAt(lot,last).map(b=>"'"+b.cid+"'").join(',')}],focus:'ok'})" title="點看成品箱"`:''}><b${finOf(lot)>0?' class="lk"':''}>${finOf(lot)}</b></td></tr>`).join('');
  el.innerHTML=`<div class="card"><h3>📊 工單 ${esc(o.no)} · ${esc(o.partNo)}${p&&p.name?'　'+esc(p.name):''}</h3>
    <div class="step">目標 <b>${tgt}</b> ${esc(o.unit||'PCS')}　｜　已成品（${stN(last)}） <b style="color:var(--teal)">${totalFin}</b>　｜　完成率 <b>${pct}%</b>　｜　批次 <b>${lots.length}</b></div>
    <div class="wipbar" style="margin:8px 0;max-width:480px"><i style="width:${pct}%"></i></div>
    <div style="overflow-x:auto"><table><thead><tr><th>批號</th>${th}<th>成品</th></tr></thead><tbody>${rows}</tbody></table></div>
    <p class="small muted">每格＝該批在該製程的 OK 產出（多箱會標「(N箱)」是合計）；「在庫N」＝還停在該站的結存。<b>點批號</b>→依批號追溯整批；<b>點格子</b>→單箱直接追該箱、多箱則開整批清單看是哪幾箱湊的。</p></div>`;
}
/* ===== ERP 工單查詢（透過本機 erp_bridge 連 Oracle ERP）=====
   廠區清單：以後要擴大使用，只要在這裡多加一筆 {id, name} 即可。
   （集團內正式公司才有 ERP 工單；非集團如 SPACE X 大永 走手動開單，不在這裡。） */

/* 工單類別大類（依 CLASS_CODE 首字；可擴充，不寫死）：S標準 R重工 O委外 N非標委外 T試跑 */
const ERP_CLASS=[{c:'',n:'全部類別'},{c:'S',n:'標準'},{c:'R',n:'重工'},{c:'O',n:'委外'},{c:'N',n:'非標委外'},{c:'T',n:'試跑'}];
function erpClsName(code){ return ({S:'標準',R:'重工',O:'委外',N:'非標委外',T:'試跑'})[(code||'').charAt(0).toUpperCase()]||''; }
function erpClsPill(code){ const t=(code||'').charAt(0).toUpperCase(); const nm=erpClsName(code)||code||'—';
  const col=({S:'#1f8a4c',R:'#b9760f',O:'#8e44ad',N:'#8e44ad',T:'#777'})[t]||'#555';
  return `<span class="pill" style="background:${col}22;color:${col}">${esc(nm)}</span>${code?` <span class="mono small">${esc(code)}</span>`:''}`; }
/* POC：集團建箱「連線檢查/重連」步驟（測本機 ERP 橋樑是否在跑）。等 Supabase/中央服務完成後可整段移除。 */

}
function erpQuery(){
  const q=($('#erp_q')?$('#erp_q').value:'').trim(); const out=$('#erp_out'); if(!out) return;
  const org=($('#erp_org')?$('#erp_org').value:'850');

    if(!d.ok){ out.innerHTML='<div class="note" style="border-color:var(--red);background:var(--redbg)">ERP 回應錯誤：'+esc(d.error||'')+'</div>'; return; }

    window._erpJobs=d.jobs;
    out.innerHTML='<div class="step">共 <b>'+d.count+'</b> 筆有效工單（Released）　<button class="btn sm" onclick="erpUseSelected()">＋ 取用勾選的</button></div><div style="overflow-x:auto"><table><thead><tr><th><input type="checkbox" title="全選" onclick="document.querySelectorAll(\'.erpck\').forEach(c=>c.checked=this.checked)"></th><th>開單日</th><th>工單號</th><th>類別</th><th>料號</th><th>品名</th><th>工單數量</th><th>未完成</th><th>對應機種</th><th></th></tr></thead><tbody>'+
      d.jobs.map((j,i)=>{ const rp=erpResolvePartNo(j.itemNo); return `<tr><td><input type="checkbox" class="erpck" value="${i}"></td><td class="small">${esc(j.creationDate)}</td><td class="mono">${esc(j.jobNo)}</td><td>${erpClsPill(j.classCode)}</td><td class="mono small">${esc(j.itemNo)}</td><td class="small">${esc(j.itemDesc)}</td><td>${esc(j.startQty)}</td><td><b style="color:var(--teal)">${esc(j.remainQty)}</b></td><td>${rp?'<span class="pill dc">'+esc((prodOf(rp)||{}).model||rp)+'</span>':'<span class="pill" style="background:#fef0dd;color:#b9760f">待對應</span>'}</td><td><button class="btn ghost sm" onclick="erpUse(${i})">取用</button></td></tr>`; }).join('')+
      '</tbody></table></div>';
  }).catch(e=>{ out.innerHTML='<div class="note" style="border-color:var(--red);background:var(--redbg)">連不到本機 ERP 橋樑，請先啟動 <b>erp_bridge.ps1</b>。<br><span class="small muted">'+esc(String(e))+'</span></div>'; });
}
function erpResolvePartNo(itemNo){ if(!itemNo) return null; const ps=db.data.products; const up=itemNo.toUpperCase();
  for(const p of ps){ if(p.partNo===itemNo) return p.partNo; }
  for(const p of ps){ if(pnoOf(p.partNo)===itemNo) return p.partNo; }
  for(const p of ps){ if(p.stages&&Object.values(p.stages).some(v=>v===itemNo)) return p.partNo; }
  for(const p of ps){ if(p.model&&up.indexOf(p.model.toUpperCase())>=0) return p.partNo; }
  return null;
}
function erpMakeRec(j){ const rp=erpResolvePartNo(j.itemNo); return { no:j.jobNo, date:j.creationDate||'', customer:'', partNo:rp||j.itemNo, qty:+j.startQty||0, unit:'PCS', dueDate:j.dueDate||'',
    note:'ERP'+(erpClsName(j.classCode)?'·'+erpClsName(j.classCode):'')+'：未完成 '+j.remainQty+' / '+j.startQty+(rp?'':'（機種待對應）'), status:'進行中', source:'erp',
    erp:{orgId:j.orgId,classCode:j.classCode,classDesc:j.classDesc,classType:erpClsName(j.classCode),itemNo:j.itemNo,itemDesc:j.itemDesc,startQty:j.startQty,remainQty:j.remainQty,completedQty:j.completedQty,status:j.status}, createdAt:new Date().toISOString() }; }
function erpUpsert(o,rec){ const idx=o.findIndex(x=>x.no===rec.no); if(idx>=0){ o[idx]={...o[idx],...rec}; return 'upd'; } o.push(rec); return 'add'; }
function erpUse(i){ const j=(window._erpJobs||[])[i]; if(!j) return; if(!can('order','c')) return toast('目前角色無法建單','err');
  const o=getOrders(); const rec=erpMakeRec(j);
  if(o.findIndex(x=>x.no===rec.no)>=0 && !confirm('工單 '+rec.no+' 已存在，要以 ERP 最新資料更新嗎？')) return;
  erpUpsert(o,rec); saveOrders(o);
  if($('#c_order')){ // 在建箱頁：刷新工單下拉並自動帶入剛取用的工單（即時、不過期）
    if($('#c_fcust'))$('#c_fcust').value=''; if($('#c_fpn'))$('#c_fpn').value='';
    $('#c_order').innerHTML=orderOptsF('',''); $('#c_order').value=String(getOrders().findIndex(x=>x.no===rec.no)); pickOrder();
    toast('已取用 '+rec.no+'，已帶入下方建箱','ok');
  } else { render(); toast('已取用工單 '+rec.no,'ok'); }
}
function erpUseSelected(){ if(!can('order','c')) return toast('目前角色無法建單','err');
  const ix=[...document.querySelectorAll('.erpck:checked')].map(c=>+c.value);
  if(!ix.length) return toast('請先勾選工單','err');
  const o=getOrders(); let add=0,upd=0;
  ix.forEach(i=>{ const j=(window._erpJobs||[])[i]; if(!j) return; const rec=erpMakeRec(j); if(erpUpsert(o,rec)==='add')add++; else upd++; });
  saveOrders(o);
  if($('#c_order')){ if($('#c_fcust'))$('#c_fcust').value=''; if($('#c_fpn'))$('#c_fpn').value=''; $('#c_order').innerHTML=orderOptsF('',''); $('#c_order').value=''; pickOrder(); toast('已取用 '+ix.length+' 筆（新增 '+add+' / 更新 '+upd+'），請於下方選工單建箱','ok'); }
  else { render(); toast('已取用 '+ix.length+' 筆（新增 '+add+' / 更新 '+upd+'）','ok'); }
}
function addOrder(){ const no=$('#od_no').value.trim(); if(!no) return toast('請輸入工單號','err'); const pn=$('#od_pn').value; if(!pn) return toast('請選機種','err'); if((+$('#od_qty').value||0)<=0) return toast('請輸入數量','err'); const o=getOrders(); o.push({no,date:$('#od_date').value,customer:$('#od_cust').value.trim()||((prodOf(pn)||{}).customer||''),partNo:pn,qty:+$('#od_qty').value||0,unit:'PCS',dueDate:$('#od_due').value.trim(),note:$('#od_note').value.trim(),status:'進行中',createdAt:new Date().toISOString()}); saveOrders(o); toast('已加明細到 '+no,'ok'); render(); }

function updFirst(){ const pn=$('#c_pn')?$('#c_pn').value:''; const p=pn?prodOf(pn):null;
  if(!p){ const f=$('#c_first'); if(f) f.innerHTML='<span class="muted small">請先選機種，下面會帶出該機種的製程路線與首站欄位</span>'; const mc=$('#c_mc'); if(mc) mc.innerHTML='<option value="">（請先選機種）</option>'; const ex=$('#c_extra'); if(ex) ex.innerHTML=''; const qw0=$('#c_qc_wrap'); if(qw0) qw0.innerHTML=''; opBig('c_op','c_opbig'); return; }
  const fc=p.route[0];
  $('#c_first').innerHTML=`機種 <b>${esc(p.model||p.partNo)}</b>${p.customer?' ｜ 客戶 '+esc(p.customer):''}　｜　首站：<b style="color:var(--teal)">${stN(fc)} (${fc})</b>`+(stageNo(p.partNo,fc)?` ｜ 階段料號 <span class="mono">${esc(stageNo(p.partNo,fc))}</span>`:'')+`<div class="flow" style="margin-top:6px">`+p.route.map(c=>`<span class="st ${c===fc?'now':''}">${stN(c)}</span>`).join('<span class="ar"> → </span>')+`</div>`;

  const ex=$('#c_extra'); if(ex){ let h=''; if(fc==='DC') h+=`<div><label>模具編號</label><select id="c_mold" onchange="onMoldPick()">${moldOpts(p.partNo,'','mold')}</select></div><div id="c_cav_wrap"><label>模穴（選填）</label><input id="c_cav" placeholder="單穴號 / 混穴"></div>`; if(stationHasJig(p.partNo,fc)) h+=`<div style="grid-column:1/-1"><label>治夾具 <span class="vi">（選填，可複選）</span></label><div id="c_jigs">${jigChips(p.partNo,fc)}</div></div>`; ex.innerHTML=h; }
  const qw=$('#c_qc_wrap'); if(qw) qw.innerHTML=procNeedQc(fc)?`<label>質控（誰驗的） <span style="color:var(--red)">*</span> <span class="small muted">本班自動帶</span></label><select id="c_qc">${qcOpts(shiftQcDefault($('#c_shift')?$('#c_shift').value:''))}</select>`:'';

function onMoldPick(){ const wrap=$('#c_cav_wrap'); if(!wrap) return; const id=$('#c_mold')?$('#c_mold').value:''; const m=getMolds().find(x=>x.id===id); const n=(m&&+m.cav>0)?+m.cav:0;
  if(n>1){ let opts='<option value="">（選穴號）</option>'; for(let i=1;i<=n;i++) opts+=`<option value="${i}">${i} 穴</option>`; opts+='<option value="混穴">混穴</option>'; wrap.innerHTML=`<label>模穴（本模 ${n} 穴）</label><select id="c_cav">${opts}</select>`; }
  else { wrap.innerHTML=`<label>模穴（選填）</label><input id="c_cav" placeholder="單穴號 / 混穴">`; } }
function createBox(){
  const ord=$('#c_order'); if(!ord||ord.value===''){ return toast('請先引用工單（工單必填）','err'); }
  const pn=$('#c_pn').value; if(!pn) return toast('此工單的機種尚未對應，請先在產品主檔建立/對應','err');
  const p=prodOf(pn); if(!p) return toast('此工單的機種尚未對應，無法取得製程路線','err'); const code=p.route[0]; const qty=+$('#c_qty').value||0;
  if(procNeedMc(code) && (!$('#c_mc')||!$('#c_mc').value.trim())) return toast('此製程需記設備，請先選設備／機台（首站批號需要）','err');
  const qcEl=$('#c_qc'); const qcv=qcEl?qcEl.value.trim():'';
  if(procNeedQc(code) && !qcv) return toast('「'+stN(code)+'」需記質控——沒人驗＝不能裝箱，請選質控人員','err');
  if(qty<=0) return toast('請輸入 OK 數','err');
  const moldEl=$('#c_mold'), cavEl=$('#c_cav');
  const c={cid:genCID(code),partNo:p.partNo,name:p.name,lot:genLot(p.model||p.partNo,$('#c_mc').value.trim(),$('#c_shift').value.trim()),orderNo:$('#c_wo').value.trim(),
    processCode:code,stagePartNo:stageNo(p.partNo,code),qty,
    nr:+$('#c_nr').value||0,ng:+$('#c_ng').value||0,
    operator:$('#c_op').value.trim(),qc:qcv,machine:$('#c_mc').value.trim(),shift:$('#c_shift').value.trim(),
    mold:moldEl?moldEl.value.trim():'',cavity:cavEl?cavEl.value.trim():'',jigs:readChecks('c_jigs'),
    sources:[],createdAt:new Date().toISOString()};
  db.data.containers.push(c); db.save(); rememberOp(c.operator); if(qcv) rememberShiftQc(qcv,c.shift); showLabel(c); toast('已建立 '+c.cid,'ok');
}
/* ===== A2 包裝批量分箱＋多標籤：可重用標籤卡 + 列印多張 ===== */
/* ===== 3a-2b：標籤 80×60mm＋Code 128（依大永現場 260720 回報：標籤紙 80×60、掃描器只認一維條碼、
   現場用 BarTender 印 Code 128）。條碼內容＝箱號 CID（鑰匙原則不變：掃碼＝把箱號打進輸入框、資料查系統）。
   Code 128 純前端生成（無外部套件）：Start B + 資料 + 檢查碼 + Stop，前後各留 10 模組靜區。 */
const C128=('212222 222122 222221 121223 121322 131222 122213 122312 132212 221213 221312 231212 112232 122132 122231 113222 123122 123221 223211 221132 221231 213212 223112 312131 311222 321122 321221 312212 322112 322211 212123 212321 232121 111323 131123 131321 112313 132113 132311 211313 231113 231311 112133 112331 132131 113123 113321 133121 313121 211331 231131 213113 213311 213131 311123 311321 331121 312113 312311 332111 314111 221411 431111 111224 111422 121124 121421 141122 141221 112214 112412 122114 122411 142112 142211 241211 221114 413111 241112 134111 111242 121142 121241 114212 124112 124211 411212 421112 421211 212141 214121 412121 111143 111341 131141 114113 114311 411113 411311 113141 114131 311141 411131 211412 211214 211232 2331112').split(' ');
function c128svg(txt){
  txt=String(txt||''); if(!txt) return '';
  for(const ch of txt){ const v=ch.charCodeAt(0); if(v<32||v>126) return '<div style="color:#900;font-size:8pt">條碼內容含不支援字元</div>'; }
  const vals=[104]; for(const ch of txt) vals.push(ch.charCodeAt(0)-32);
  let ck=104; for(let i=1;i<vals.length;i++) ck+=vals[i]*i; vals.push(ck%103,106);
  let bars=''; vals.forEach(v=>bars+=C128[v]);
  const total=[...bars].reduce((a,c0)=>a+ +c0,0)+20;
  let x=10,rects=''; [...bars].forEach((w,i)=>{ const wd=+w; if(i%2===0) rects+=`<rect x="${x}" y="0" width="${wd}" height="100" fill="#000"/>`; x+=wd; });
  return `<svg viewBox="0 0 ${total} 100" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg" shape-rendering="crispEdges">${rects}</svg>`;
}

/* 把 root 內所有 .qrbox[data-cid] 補上 QR（無 lib 時退化成箱號 badge） */
function fillQRs(root){ (root||document).querySelectorAll('.qrbox[data-cid]').forEach(box=>{ const cid=box.getAttribute('data-cid'); const c=findC(cid)||{cid,partNo:'',qty:''}; box.innerHTML='';
  const payload=`PN:${c.partNo}|CID:${c.cid}|QTY:${c.qty}`;
  if(window.QRCode){ try{ new QRCode(box,{text:payload,width:104,height:104,correctLevel:QRCode.CorrectLevel.M}); }catch(e){ box.innerHTML=`<div class="badge">${esc(c.cid)}</div>`; } } else box.innerHTML=`<div class="badge">${esc(c.cid)}</div>`; }); }
function showLabel(c){ const a=$('#labelArea'); if(!a) return; a.innerHTML=lblCardHTML(c)+`<div style="margin-top:10px"><button class="btn navy sm" onclick="printLabels(['${esc(c.cid)}'])">🖨 列印標籤</button></div>`; fillQRs(a); }
/* 列印多張標籤：開列印浮層、補 QR，按「列印」走 window.print（@media print 只留標籤） */
function printLabels(cids){ cids=(cids||[]).filter(Boolean); if(!cids.length) return toast('無可列印標籤','err');
  let ov=$('#printOverlay'); if(!ov){ ov=document.createElement('div'); ov.id='printOverlay'; document.body.appendChild(ov); }
  /* 84-1 浮層抵銷 body zoom（zoom 是相乘的：1/z × z = 1）→ 螢幕預覽＝實際 80×60，不再超出視窗 */
  try{ const z=parseFloat(document.body.style.zoom)||1; ov.style.zoom=String(1/z); }catch(e){}
  const cards=cids.map((cid,i)=>{ const c=findC(cid); return c?lblCardHTML(c,{cap:cids.length>1?('第 '+(i+1)+' / '+cids.length+' 箱'):''}):''; }).join('');
  ov.innerHTML=`<div class="po-bar"><b>列印標籤（${cids.length} 張）</b><span><button class="btn navy sm" onclick="window.print()">🖨 列印</button> <button class="btn gray sm" onclick="closePrint()">關閉</button></span></div><div class="po-labels">${cards}</div>`;
  ov.style.display='block'; document.body.classList.add('printing'); fillQRs(ov);
}
function closePrint(){ const ov=$('#printOverlay'); if(ov){ ov.style.display='none'; ov.innerHTML=''; } document.body.classList.remove('printing'); }

/* ---------- 03 接收點交（3a-2：A 嚴格——後站物控掃箱＝移轉完成） ----------
   點交＝責任分界：掃箱那一刻＝前站轉出＋後站接收。不產新箱、不動批號；帳差時箱數量改為實收。
   委外站（下一站已勾委外）＝「轉出」點交（對面沒有系統操作者，由本廠物控補掃）；回廠不點交（量由委外報工記）。
   點交人＝登入者（物控一人一帳、自己設備）。 */
window._rv=[];

function rvPendToggle(){ const el=$('#rv_pend'); if(!el) return; if(el.style.display==='none'){ el.style.display='block';
  const list=rvPending();
  el.innerHTML=list.length?`<div style="overflow-x:auto"><table><thead><tr><th>箱號</th><th>機種 / 料號</th><th>批號</th><th>目前站 → 接收站</th><th>數量</th><th></th></tr></thead><tbody>${list.map(c=>{ const nx=nextStation(c.partNo,c.processCode); const os=isOS(c.partNo,nx); return `<tr><td><span class="badge">${esc(c.cid)}</span></td><td>${pnCell(c.partNo)}</td><td class="mono small">${esc(c.lot||'-')}</td><td class="small"><span class="pill dc">${stN(c.processCode)}</span> → ${stN(nx)}${os?' <span class="pill" style="background:#fef0dd;color:#b9760f;font-size:10px">委外轉出</span>':''}</td><td style="text-align:right">${c.qty}</td><td><button class="btn sm" onclick="rvAdd('${esc(c.cid)}')">＋</button></td></tr>`; }).join('')}</tbody></table></div>`:'<div class="empty">沒有待接收的箱</div>'; }

function rvAdd(cid0){
  const inp=$('#rv_cid'); const cid=(cid0||(inp?inp.value:'')||'').trim().toUpperCase(); if(!cid) return;
  const c=findC(cid); if(!c) return toast('找不到箱號','err');
  if(!isNormalBox(c)) return toast('NR／NG 不良箱不走正常點交（由會判處置後回流）','err');
  if(remaining(c.cid)<=0) return toast('此箱無結存（已投入/已轉出）','err');
  const nx=nextStation(c.partNo,c.processCode); if(!nx) return toast('此箱已在末站','err');
  if(isReceived(c)) return toast('此箱已點交過（'+stN(c.received.station)+'・'+(c.received.by||'')+'）','err');
  if(window._rv.includes(cid)) return toast('已在清單','err');
  window._rv.push(cid); if(inp&&!cid0) inp.value=''; rvList(); if(inp) inp.focus();
}
function rvRemove(i){ window._rv.splice(i,1); rvList(); }
function rvCalc(i){ const c=findC(window._rv[i]); const a=+(($('#rv_a'+i)||{}).value||0); const d=a-c.qty; const el=$('#rv_d'+i); if(el) el.innerHTML=d===0?'—':`<b style="color:#b9760f">${d>0?'+':''}${d}</b>`; const rw=$('#rv_r'+i); if(rw) rw.style.visibility=d===0?'hidden':'visible'; }
function rvList(){
  const box=$('#rv_list'); const cnt=$('#rv_cnt'); if(!box) return;
  if(cnt) cnt.textContent=window._rv.length?('已掃 '+window._rv.length+' 箱'):'';
  if(!window._rv.length){ box.innerHTML='<div class="empty">尚未掃箱。掃標籤加入，或開「待接收清單」點加入。</div>'; return; }
  box.innerHTML=`<div style="overflow-x:auto"><table><thead><tr><th>箱號</th><th>機種</th><th>目前站 → 接收站</th><th>應收</th><th>實收</th><th>帳差</th><th>責任歸屬</th><th>備註</th><th></th></tr></thead><tbody>
  ${window._rv.map((cid,i)=>{ const c=findC(cid); const nx=nextStation(c.partNo,c.processCode); const os=isOS(c.partNo,nx);
    return `<tr><td><span class="badge">${esc(cid)}</span></td><td>${pnCell(c.partNo)}</td>
      <td class="small"><span class="pill dc">${stN(c.processCode)}</span> → <b>${stN(nx)}</b>${os?` <span class="pill" style="background:#fef0dd;color:#b9760f;font-size:10px">委外轉出</span> <select id="rv_v${i}" style="width:auto;font-size:12px">${vendorListFor(nx).map(v=>`<option>${esc(v)}</option>`).join('')}</select>`:''}</td>
      <td style="text-align:right">${c.qty}</td>
      <td><input id="rv_a${i}" type="number" value="${c.qty}" style="width:90px" oninput="rvCalc(${i})"></td>
      <td id="rv_d${i}" style="text-align:right">—</td>
      <td><span id="rv_r${i}" style="visibility:hidden"><select id="rv_rs${i}" style="width:auto"><option value="前站" selected>前站 ${stN(c.processCode)}</option><option value="後站">後站 ${stN(nx)}</option></select></span></td>
      <td><input id="rv_n${i}" placeholder="（選填）" style="width:110px"></td>
      <td><button class="btn ghost sm" onclick="rvRemove(${i})">✕</button></td></tr>`; }).join('')}
  </tbody></table></div>
  <div class="small muted" style="margin-top:6px">實收預設＝應收（箱上數量現值），清點有短少才改；帳差≠0 才選責任歸屬（預設<b>前站</b>——交出前少了算前站）。</div>`;
}
function rvDone(){
  if(!window._rv.length) return toast('請先掃箱','err');
  for(let i=0;i<window._rv.length;i++){ const a=+(($('#rv_a'+i)||{}).value||0); if(!(a>=0)) return toast(window._rv[i]+' 實收數不正確','err'); }
  const by=sessionName()||'—'; const at=nowISO(); let nOut=0,nDiff=0;
  window._rv.forEach((cid,i)=>{ const c=findC(cid); const nx=nextStation(c.partNo,c.processCode); const os=isOS(c.partNo,nx);
    const expect=c.qty; const actual=+(($('#rv_a'+i)||{}).value||0); const diff=actual-expect;
    const resp=diff!==0?((($('#rv_rs'+i)||{}).value)||'前站'):''; const note=((($('#rv_n'+i)||{}).value)||'').trim();
    if(os) nOut++; if(diff!==0){ nDiff++; c.qty=actual; }   // 帳差：箱數量改為實收（下游走實數），應收/差額固化在點交記錄
    c.received={station:nx,by,at,expect,actual,diff,resp,note,kind:os?'sendout':'receive',vendor:os?((($('#rv_v'+i)||{}).value)||vendorListFor(nx)[0]||''):''};
    db.data.reports.push({id:'H'+Date.now()+i,type:'handover',kind:os?'sendout':'receive',cid,partNo:c.partNo,lot:c.lot,orderNo:c.orderNo,
      fromStation:c.processCode,toStation:nx,expect,actual,diff,resp,note,by,createdAt:at});
  });
  db.save();
  toast('完成點交 '+window._rv.length+' 箱'+(nOut?'（含委外轉出 '+nOut+'）':'')+(nDiff?'・帳差 '+nDiff+' 箱':''),'ok');
  window._rv=[]; render();
}
/* ===== 84-11 全頁掃碼攔截（keyboard wedge）：保證掃描槍資料一定被系統接收 =====
   掃描槍＝高速鍵盤（字元間隔極短＋結尾 Enter）。若焦點不在任何輸入框，掃出的字元原本會流失；
   這裡在 接收點交／過站報工 兩頁全頁監聽：偵測高速字串+Enter → 自動導入箱號欄並觸發加入/帶出。
   焦點在輸入框內時不攔截（照常打字/原生 Enter 流程）。 */
let _scanBuf='',_scanT=0;
document.addEventListener('keydown',function(e){
  try{
    const ae=document.activeElement;
    if(ae&&(ae.tagName==='INPUT'||ae.tagName==='TEXTAREA'||ae.tagName==='SELECT')) return;   // 欄位內＝原生流程
    if(typeof cur==='undefined'||(cur!=='receive'&&cur!=='report')) return;
    const now=Date.now(); if(now-_scanT>80) _scanBuf=''; _scanT=now;   // 字元間隔>80ms＝人手打字，重置
    if(e.key==='Enter'){
      if(_scanBuf.length>=6){ const code=_scanBuf; _scanBuf='';
        if(cur==='receive'){ const i=$('#rv_cid'); if(i){ i.value=code; rvAdd(); } }
        else { const i=$('#r_cid'); if(i){ i.value=code; loadInfo(); const t=$('#r_take'); if(t) t.focus(); } }
        e.preventDefault(); }
      return; }
    if(e.key&&e.key.length===1) _scanBuf+=e.key;
  }catch(err){}
});

// 下一站「目前在站堆積」：製程站＝nx 且仍有結存的箱（＝已停在該站、尚未轉出/出貨的量），全機種
function nextBacklog(nx){ let q=0,n=0; db.data.containers.forEach(x=>{ if(!isNormalBox(x)) return; if(x.processCode!==nx) return; const r=remaining(x.cid); if(r>0){ q+=r; n++; } }); return {q,n}; }
function backlogBoxes(nx){ return db.data.containers.filter(x=>isNormalBox(x)&&x.processCode===nx&&remaining(x.cid)>0).sort((a,b)=>String(a.createdAt).localeCompare(String(b.createdAt))); }
// 在站堆積明細：列出目前停在 nx 站的每一箱（全機種），點箱可追溯
function showBacklog(nx){ const el=$('#r_backlog'); if(!el||!nx) return;
  const list=backlogBoxes(nx); const q=list.reduce((a,x)=>a+remaining(x.cid),0);
  el.innerHTML=`<div class="note" style="margin:0 0 6px">下一站「${stN(nx)}」目前在站堆積：共 <b>${list.length}</b> 箱、<b style="color:#b9760f">${q}</b> pcs（已停在該站、尚未轉出/出貨；點箱可追溯）<a class="lk small" style="float:right;cursor:pointer" onclick="$('#r_backlog').style.display='none'">收合</a></div>
   ${list.length?`<table><thead><tr><th>箱號</th><th>機種</th><th>批號</th><th>結存</th><th>狀態</th><th>時間</th></tr></thead><tbody>

   </tbody></table>`:'<div class="empty">該站目前無在站堆積</div>'}`;
  el.style.display='block';
}

/* 查找箱號：列出可領用的在庫來源箱（有結存且有下一站；已開始領料則鎖同機種同製程），點選帶入領料 */
function eligibleSrc(){
  let list=db.data.containers.filter(c=>isNormalBox(c) && remaining(c.cid)>0 && nextStation(c.partNo,c.processCode) && canDraw(c));   // 3a-2 A嚴格：只列已接收
  if(window._draws.length){ const f=findC(window._draws[0].cid); if(f) list=list.filter(c=>c.partNo===f.partNo&&c.processCode===f.processCode); }
  return list.sort((a,b)=>String(a.processCode).localeCompare(String(b.processCode))||String(a.cid).localeCompare(String(b.cid)));
}
function toggleFinder(){ const el=$('#r_finder'); if(!el) return;

function pickSrc(cid){ const c=findC(cid); if(!c) return; $('#r_cid').value=cid; const already=window._draws.filter(d=>d.cid===cid).reduce((a,d)=>a+d.take,0); const rem=remaining(cid)-already; if(rem>0&&!(+$('#r_take').value)) $('#r_take').value=rem; loadInfo(); const fn=$('#r_finder'); if(fn) fn.style.display='none'; }
function addDraw(){
  const cid=$('#r_cid').value.trim().toUpperCase(); const take=+$('#r_take').value||0; const c=findC(cid);
  if(!c) return toast('找不到箱號','err');
  const nx=nextStation(c.partNo,c.processCode); if(!nx) return toast('此箱已在末站，無下一站','err');
  if(!canDraw(c)) return toast('此箱尚未點交——嚴格模式：先到「接收點交」掃箱接收，才能投入報工','err');
  if(window._draws.length){ const f=findC(window._draws[0].cid);
    if(f.partNo!==c.partNo) return toast('同一次報工的來源箱需同機種','err');
    if(f.processCode!==c.processCode) return toast('同一次報工的來源箱需同製程站','err'); }
  const already=window._draws.filter(d=>d.cid===cid).reduce((a,d)=>a+d.take,0);
  const rem=remaining(cid)-already;
  if(take<=0) return toast('請輸入領用數','err');
  if(take>rem) return toast(`超過剩餘可領（剩 ${rem}）`,'err');
  const ex=window._draws.find(d=>d.cid===cid); if(ex) ex.take+=take; else window._draws.push({cid,take});
  $('#r_cid').value=''; $('#r_take').value=''; $('#r_info').innerHTML=''; renderDraws();
}

/* demo：模擬掃碼 = 從該類清單跳出選單帶入（正式版為相機掃 QR，依前綴 EMP/MAC 自動歸位） */
function scanPick(targetId,kind,code){
  let list;
  if(kind==='operator') list=prodOpsList();
  else list=machinesFor(code).map(m=>m.id);
  const pick=prompt('（demo 模擬掃碼）請輸入或貼上掃到的'+(kind==='operator'?'工牌人員':'機台')+'：\n可選：'+list.join(' / '));
  if(pick==null) return; const v=pick.trim(); if(!v) return;
  const sel=$('#'+targetId); if(![...sel.options].some(o=>o.value===v)){ const opt=document.createElement('option'); opt.value=v; opt.textContent=v; sel.appendChild(opt); }
  sel.value=v; toast('已帶入：'+v,'ok');
}
function doReport(){
  if(!window._draws.length) return toast('請先加入來源箱','err');
  const ok=+$('#o_ok').value||0, nr=+$('#o_nr').value||0, ng=+$('#o_ng').value||0;
  const total=window._draws.reduce((a,d)=>a+d.take,0);
  if(ok+nr+ng!==total) return toast(`OK+NR+NG=${ok+nr+ng} ≠ 領料 ${total}`,'err');
  if(ok<0) return toast('OK 不可負','err');
  const first=findC(window._draws[0].cid); const nx=nextStation(first.partNo,first.processCode);
  const vEl=$('#o_vendor'); const into=$('#o_into').value;
  const shift=($('#o_shift').value||'').trim(), op=($('#o_op')?$('#o_op').value:'').trim(), mc=($('#o_mc')?$('#o_mc').value:'').trim(), vendor=vEl?vEl.value.trim():'';
  const qc=($('#o_qc')?$('#o_qc').value:'').trim();
  const os=isOS(first.partNo,nx);
  if(os){ if(!vendor) return toast('委外站請選委外廠商','err'); }
  else if(procNeedMc(nx) && !mc) return toast('「'+stN(nx)+'」需記設備，請選設備／機台','err');
  if(procNeedQc(nx) && !qc) return toast('「'+stN(nx)+'」需記質控——沒人驗＝不能裝箱，請選質控人員','err');
  // 把領料依序切給 OK/NR/NG（每個來源箱只計一次→結存正確）
  const [okD,nrD,ngD]=splitDraws(window._draws,[ok,nr,ng]);
  const jigs=readChecks('o_jigs');
  const per=(nx==='PK'&&$('#o_per'))?(+$('#o_per').value||0):0;   // A2 包裝批量分箱：每箱裝入 pcs
  let intoCid=null; let createdCids=[];
  if(ok>0){
    if(into){ const b=findC(into); b.qty+=ok; (b.sources=b.sources||[]).push(...okD); if(!b.qc&&qc) b.qc=qc; intoCid=into; createdCids=[into]; }
    else if(per>0){   // 依每箱 pcs 分多紙箱：第一箱承載實際領料、其餘掛零量來源(全集合可追、結存只算一次)
      const nBox=Math.ceil(ok/per); let left=ok; const zero=window._draws.map(d=>({cid:d.cid,take:0}));
      for(let i=0;i<nBox;i++){ const q=Math.min(per,left); left-=q;
        const nc={cid:genCID(nx),partNo:first.partNo,name:first.name,lot:first.lot,orderNo:first.orderNo,
          processCode:nx,stagePartNo:stageNo(first.partNo,nx),qty:q,operator:op,qc,machine:mc,vendor,shift,workType:'normal',
          jigs,pack:'carton',oqc:'待OQC',sources:i===0?okD:zero.slice(),createdAt:nowISO()};   // 84-12 補：報工分箱紙箱同烤漆路徑掛「待OQC」佔位（3a-3 回歸 W-05 抓到）
        db.data.containers.push(nc); createdCids.push(nc.cid); }
      intoCid=createdCids[0];
    }
    else { const nc={cid:genCID(nx),partNo:first.partNo,name:first.name,lot:first.lot,orderNo:first.orderNo,
        processCode:nx,stagePartNo:stageNo(first.partNo,nx),qty:ok,operator:op,qc,machine:mc,vendor,shift,workType:'normal',
        jigs,sources:okD,createdAt:nowISO()};
      db.data.containers.push(nc); intoCid=nc.cid; createdCids=[nc.cid]; }
  }
  // NR→NR不良箱、NG→NG報廢箱（批+站累加；現場自檢初判，待工程/品保會判）
  const meta={op,mc,shift,vendor,qc};
  const nrCid=nr>0?addDefect('NR',nx,first,nrD,meta):null;
  const ngCid=ng>0?addDefect('NG',nx,first,ngD,meta):null;
  // 報工記錄（NR/NG/班次 audit；nrCid/ngCid 連到不良箱）
  db.data.reports.push({id:'R'+Date.now()+Math.floor(Math.random()*1000),partNo:first.partNo,lot:first.lot,orderNo:first.orderNo,
    fromStation:first.processCode,toStation:nx,draws:window._draws.map(d=>({cid:d.cid,take:d.take})),ok,nr,ng,intoCid,nrCid,ngCid,shift,operator:op,qc,createdAt:nowISO()});
  db.save(); rememberOp(op); if(qc) rememberShiftQc(qc,shift);
  toast(`報工完成：領 ${total} → OK ${ok}${createdCids.length>1?'（'+createdCids.length+'紙箱）':''}${nr?' / NR '+nr+'→'+nrCid:''}${ng?' / NG '+ng+'→'+ngCid:''}`,'ok');
  window._draws=[]; renderReport();
  const re=$('#r_result'); if(re && createdCids.length){ const multi=createdCids.length>1;
    re.innerHTML=`<div class="card"><h3>✅ 報工完成 — 產出箱${multi?`（${createdCids.length} 箱）`:''}</h3>
      <div style="overflow-x:auto"><table><thead><tr><th>箱號</th><th>數量</th>${multi?'<th>標籤</th>':''}</tr></thead><tbody>
      ${createdCids.map(cid=>{ const c=findC(cid); return `<tr><td><span class="badge">${esc(cid)}</span>${c&&c.pack==='carton'?' <span class="pill" style="background:#eef;color:#3355aa;font-size:10px">紙箱</span>':''}</td><td>${c?c.qty:''}</td>${multi?`<td><button class="btn ghost sm" onclick="printLabels(['${esc(cid)}'])">🖨</button></td>`:''}</tr>`; }).join('')}
      </tbody></table></div>
      <div style="margin-top:10px"><button class="btn navy" onclick='printLabels(${JSON.stringify(createdCids)})'>🖨 列印${multi?` 全部 ${createdCids.length} 張`:''}標籤</button></div></div>`;
  }
}

/* ---------- 05 混批換箱（烤漆等：多箱來源 → 多箱成品） ---------- */
window._pk=[];
function renderPaint(){
  const avail=db.data.containers.filter(c=>isNormalBox(c) && remaining(c.cid)>0 && nextStation(c.partNo,c.processCode) && stOf(nextStation(c.partNo,c.processCode)).code && (nextStation(c.partNo,c.processCode)==='PK'||nextStation(c.partNo,c.processCode)==='PT') && canDraw(c));   // 3a-2 A嚴格：進爐來源需已接收；補噴NR箱豁免（下一行 repaint 清單）
  const repaint=db.data.containers.filter(c=>c.kind==='NR' && c.paintRepair && remaining(c.cid)>0 && (c.processCode==='PK'||c.processCode==='PT'));
  $('#view').innerHTML=`
  <div class="page-h"><h2>${L('混批換箱（烤漆 / 粉烤）')}</h2><p>多箱混批進爐 → 出爐後按包裝規格重裝。烤漆<b>斷軌</b>：產出只追溯到投入來源箱「集合」。可一併投入上次烤漆的 NR <b>補噴</b>箱（同機種）。</p></div>

    ${(avail.length||repaint.length)?`<div id="pk_src">${avail.map(c=>`<span class="chip" data-c="${c.cid}" onclick="togglePk(this)">${c.cid} · 剩${remaining(c.cid)} · ${stN(c.processCode)}→${stOf(nextStation(c.partNo,c.processCode)).zh}</span>`).join('')}</div>
    ${repaint.length?`<div class="small muted" style="margin:10px 0 4px">🔁 ${L('待補噴（上次烤漆 NR，可同機種一起再投入）')}：</div><div id="pk_repair">${repaint.map(c=>`<span class="chip" data-c="${c.cid}" onclick="togglePk(this)" style="border-color:#b9760f;color:#b9760f">${c.cid} · 剩${remaining(c.cid)} · 補噴 ${pnCell?(prodOf(c.partNo)||{}).model||c.partNo:c.partNo}</span>`).join('')}</div>`:''}`
    :`<div class="empty">沒有可進爐的來源箱（需下一站為烤漆/包裝且尚有結存，或有待補噴 NR 箱）</div>`}
    <div id="pk_sum" class="step" style="margin-top:10px"></div></div>
  <div class="card"><h3>${L('② 出爐結算（OK→紙箱 / NR→補噴箱 / NG→報廢）')}</h3>
    <div class="grid g3"><div><label>${L('出爐 OK（轉紙箱）')}</label><input id="pk_good" type="number" placeholder="如 580"></div>
      <div><label>${L('NR（留膠箱待補噴/會判）')}</label><input id="pk_nr" type="number" value="0"></div>
      <div><label>${L('NG（報廢）')}</label><input id="pk_ng" type="number" value="0"></div>
      <div><label>${L('每箱裝入 pcs（紙箱）')}</label><input id="pk_per" type="number" placeholder="如 148"></div>
      <div><label>${L('作業員')}</label><select id="pk_op">${operatorOpts(lastOp())}</select></div>
      <div><label>${L('質控（誰驗的）')} <span style="color:var(--red)">*</span> <span class="small muted">本班自動帶</span></label><select id="pk_qc">${qcOpts(shiftQcDefault(''))}</select></div></div>
    <div class="small muted" style="margin-top:8px">OK+NR+NG 需＝入爐總數（烤漆<b>斷軌</b>，產出只追溯到投入來源箱「<b>集合</b>」、非 1:1）。OK÷每箱→多個<b>紙箱</b>(待 OQC)；NR→<b>烤漆補噴箱</b>(下次同機種一起補噴 / 或會判轉製程)；NG→報廢箱。</div>
    <div style="margin-top:14px"><button class="btn lg gold" onclick="doPaint()">${L('出爐結算')}</button></div>

function togglePk(el){ const cid=el.dataset.c; const i=window._pk.indexOf(cid); if(i>=0)window._pk.splice(i,1);else window._pk.push(cid); el.classList.toggle('sel');
  const tot=window._pk.reduce((a,cid)=>a+remaining(cid),0); $('#pk_sum').innerHTML=window._pk.length?`已選 <b>${window._pk.length}</b> 箱，入爐合計 <b>${tot}</b> pcs`:'尚未選擇'; }
function doPaint(){
  if(!window._pk.length) return toast('請至少選一個來源箱','err');
  const ok=+$('#pk_good').value||0, nr=+$('#pk_nr').value||0, ng=+$('#pk_ng').value||0, per=+$('#pk_per').value||0;
  const inTot=window._pk.reduce((a,cid)=>a+remaining(cid),0);
  if(ok+nr+ng<=0) return toast('請填出爐 OK / NR / NG','err');
  if(ok>0&&per<=0) return toast('OK 轉紙箱需填每箱裝入 pcs','err');
  if(ok+nr+ng!==inTot) return toast(`OK+NR+NG=${ok+nr+ng} ≠ 入爐 ${inTot}`,'err');
  // 出爐站：一般來源(BL等)→nextStation(=烤漆站)；補噴箱本身已在烤漆站→出爐回同站
  const firstNormal=window._pk.map(findC).find(c=>isNormalBox(c)); const firstAny=findC(window._pk[0]);
  const first=firstNormal||firstAny;
  const nx=firstNormal?nextStation(firstNormal.partNo,firstNormal.processCode):firstAny.processCode;
  if(!nx) return toast('無法判定出爐站','err');
  const op=($('#pk_op').value||'').trim();
  const qc=($('#pk_qc')?$('#pk_qc').value:'').trim();
  if(procNeedQc(nx) && !qc) return toast('「'+stN(nx)+'」需記質控——沒人驗＝不能出爐裝箱，請選質控人員','err');
  // 斷軌：產出只追溯到投入「集合」。splitDraws 把入爐量切給 OK/NR/NG（各源箱只計一次→結存正確）
  const inputDraws=window._pk.map(cid=>({cid,take:remaining(cid)}));
  const [okD,nrD,ngD]=splitDraws(inputDraws,[ok,nr,ng]);
  const zero=window._pk.map(cid=>({cid,take:0}));
  // OK → 紙箱(carton, 待OQC)：第一箱承載實際領料(okD)，其餘箱掛零量來源(全集合可追)
  const nBox=ok>0?Math.ceil(ok/per):0; const created=[]; let left=ok;
  for(let i=0;i<nBox;i++){ const q=Math.min(per,left); left-=q;
    const nc={cid:genCID(nx),partNo:first.partNo,name:first.name,lot:first.lot,orderNo:first.orderNo,processCode:nx,
      stagePartNo:stageNo(first.partNo,nx),qty:q,operator:op,qc,machine:'烤漆線',workType:'normal',pack:'carton',oqc:'待OQC',
      sources:i===0?okD:zero.slice(),createdAt:nowISO()}; db.data.containers.push(nc); created.push(nc); }
  // NR → 烤漆補噴箱（run 層級、留膠箱待補噴/會判）；NG → 烤漆報廢箱（皆掛整組投入來源 = 斷軌集合追溯）
  let nrCid=null,ngCid=null;
  if(nr>0){ nrCid=genDefCID('NR',nx); db.data.containers.push({cid:nrCid,partNo:first.partNo,name:first.name,lot:first.lot,orderNo:first.orderNo,
      processCode:nx,stagePartNo:stageNo(first.partNo,nx),qty:nr,kind:'NR',paintRepair:true,operator:op,qc,machine:'烤漆線',sources:nrD,disp:[],createdAt:nowISO()}); }
  if(ng>0){ ngCid=genDefCID('NG',nx); db.data.containers.push({cid:ngCid,partNo:first.partNo,name:first.name,lot:first.lot,orderNo:first.orderNo,
      processCode:nx,stagePartNo:stageNo(first.partNo,nx),qty:ng,kind:'NG',operator:op,qc,machine:'烤漆線',sources:ngD,createdAt:nowISO()}); }
  db.data.reports.push({id:'R'+Date.now(),partNo:first.partNo,lot:first.lot,fromStation:first.processCode,toStation:nx,
    draws:inputDraws,ok,nr,ng,intoCid:created[0]?created[0].cid:null,nrCid,ngCid,shift:'',operator:op,qc,mix:true,createdAt:nowISO()});
  db.save(); rememberOp(op); if(qc) rememberShiftQc(qc,'');
  const srcList=window._pk.join(' / ');
  const resultHTML=`<div class="note" style="border-color:var(--green);background:#e6f4ec">入爐 ${inTot} → OK ${ok}（紙箱 ${nBox}）/ NR ${nr}${nrCid?'（'+nrCid+'）':''} / NG ${ng}${ngCid?'（'+ngCid+'）':''}</div>
    ${created.length?`<table><thead><tr><th>${L('紙箱號')}</th><th>${L('數量')}</th><th>OQC</th><th>${L('投入來源（集合）')}</th></tr></thead><tbody>${created.map(c=>`<tr><td><span class="badge">${c.cid}</span> <span class="pill" style="background:#eef;color:#3355aa;font-size:10px">紙箱</span></td><td>${c.qty}</td><td><span class="pill" style="background:#fef0dd;color:#b9760f;font-size:10px">待OQC</span></td><td class="small muted">${srcList}</td></tr>`).join('')}</tbody></table>`:''}${created.length?`<div style="margin-top:10px"><button class="btn navy" onclick='printLabels(${JSON.stringify(created.map(c=>c.cid))})'>🖨 列印全部紙箱標籤（${created.length} 張）</button></div>`:''}`;
  toast(`出爐：OK ${ok}（${nBox}紙箱）/ NR ${nr} / NG ${ng}`,'ok'); window._pk=[]; renderPaint(); const re=$('#pk_result'); if(re) re.innerHTML=resultHTML;
}

/* 84-7 全部箱號排序：點表頭切換 ▲▼（比照生產單 V54）。數字/時間欄預設降冪、文字欄預設升冪 */
window._allSort=window._allSort||{k:'time',d:-1};
function aVal(c,k){ switch(k){
  case 'cid':return c.cid||''; case 'wo':return c.orderNo||''; case 'lot':return c.lot||'';
  case 'proc':return stN(c.processCode)||''; case 'ok':return +c.qty||0; case 'drawn':return drawnOut(c.cid);
  case 'bal':return remaining(c.cid); case 'st':return remaining(c.cid)>0?1:0; case 'op':return c.operator||'';
  default:return c.createdAt||''; } }
function aSortBy(k){ const s=window._allSort; if(s.k===k) s.d=-s.d; else window._allSort={k,d:(k==='ok'||k==='drawn'||k==='bal'||k==='time')?-1:1}; renderAllTable(); }
function aArr(k){ const s=window._allSort; return s.k===k?(s.d>0?' ▲':' ▼'):''; }
function renderAllTable(){
  const kw=($('#a_kw')?$('#a_kw').value:'').trim().toLowerCase();
  const pn=$('#a_pn')?$('#a_pn').value:''; const st=$('#a_st')?$('#a_st').value:''; const state=$('#a_state')?$('#a_state').value:'';

  rows=rows.filter(c=>(!pn||c.partNo===pn)&&(!st||c.processCode===st));
  if(state==='stock') rows=rows.filter(c=>remaining(c.cid)>0);
  if(state==='moved') rows=rows.filter(c=>remaining(c.cid)<=0);
  if(kw) rows=rows.filter(c=>[c.cid,c.lot,c.partNo,c.name,c.operator,c.machine].join(' ').toLowerCase().includes(kw));
  const so=window._allSort;
  rows=rows.slice().sort((a,b)=>{ const va=aVal(a,so.k),vb=aVal(b,so.k);
    const r=(typeof va==='number'&&typeof vb==='number')?va-vb:String(va).localeCompare(String(vb),'zh-Hant');
    return r*so.d; });
  const el=$('#a_table'); const tot=rows.reduce((a,c)=>a+(+c.qty||0),0); const remTot=rows.reduce((a,c)=>a+remaining(c.cid),0);

  el.innerHTML=`<style>

       ＋表頭凍結（.tblwrap 捲動＋sticky，本頁無欄寬拖動 JS 不踩舊坑）＋點表頭排序。欄砍兩支後字級回升 12px */

    #a_table th:nth-child(5),#a_table td:nth-child(5),#a_table th:nth-child(6),#a_table td:nth-child(6),#a_table th:nth-child(7),#a_table td:nth-child(7){text-align:right}

  </style><div class="step">共 <b>${rows.length}</b> 箱（全系統 ${db.data.containers.filter(isNormalBox).length} 箱）｜ OK合計 ${tot} ｜ 結存合計 <b>${remTot}</b>　<span class="muted small">點表頭可排序；機種請看批號首段、料號滑過箱號顯示</span></div>
    ${rows.length?`<div class="tblwrap"><table><thead><tr>${TH('cid',L('箱號'))}${TH('wo','工單號')}${TH('lot',L('批號'))}${TH('proc',L('製程'))}${TH('ok',L('OK數'))}${TH('drawn',L('已領走'))}${TH('bal',L('結存'))}${TH('st',L('狀態'))}${TH('op',L('作業員'))}${TH('time',L('時間'))}</tr></thead><tbody>
    ${rows.map(c=>{ const p=prodOf(c.partNo)||{}; const tip='機種 '+(p.model||c.partNo)+'｜料號 '+c.partNo+(p.name?'｜'+p.name:'');
      return `<tr style="cursor:pointer" onclick="traceBox('${c.cid}')">

</tr>`; }).join('')}
    </tbody></table></div>`:'<div class="empty">無符合資料</div>'}`;
}

// 用某一種方式查找時，清掉其它區塊的舊結果，避免殘留混淆
function clearTraceOuts(keep){ ['t_out','q_out','b_out','iv_out'].forEach(id=>{ if(id!==keep){ const el=$('#'+id); if(el) el.innerHTML=''; } }); }
function doInterval(){
  const pn=$('#iv_pn').value, st=$('#iv_st').value;
  const from=$('#iv_from').value, to=$('#iv_to').value;
  const out=$('#iv_out'); clearTraceOuts('iv_out');
  let reps=db.data.reports.filter(r=>(!pn||r.partNo===pn)&&(!st||r.toStation===st));
  if(from) reps=reps.filter(r=>(r.createdAt||'').slice(0,10)>=from);
  if(to) reps=reps.filter(r=>(r.createdAt||'').slice(0,10)<=to);
  if(!reps.length){ out.innerHTML='<div class="empty">此條件區間內無報工紀錄</div>'; return; }
  // 逐批(機種+批+站)加總
  const g={};
  reps.forEach(r=>{ const k=r.partNo+'|'+r.lot+'|'+r.toStation;
    const o=g[k]||(g[k]={pn:r.partNo,lot:r.lot,st:r.toStation,input:0,ok:0,nr:0,ng:0,last:''});
    o.input+=(r.draws||[]).reduce((a,x)=>a+(+x.take||0),0); o.ok+=(+r.ok||0); o.nr+=(+r.nr||0); o.ng+=(+r.ng||0);

   （示範資料的載入已移進 bootApp；登入成功才會跑） */
(function initMHR(){
  const s=getSession();
  if(s && s.token && s.profile){ if(s.mustChange) showChangePwd(); else bootApp(); }
  else { const e=$('#lg_email'); if(e) e.focus(); }
})();
/* 等比縮放：以 14 吋(基準寬 1366px) 為設計基礎，大螢幕按比例放大（字體+欄寬+間距整體等比；小於基準維持1，可橫捲）
   ★ 別加「高度上限」去壓 zoom：body 有 zoom 時 CSS 座標系會等比縮小，
     例如 1920×937 @zoom1.41 → 版面實際看到 1362×665，本來就會命中上面
     `(max-height:700px)` 而自動改成頂部橫向選單。若硬壓 zoom（如 ÷760→1.23），
     CSS 高度反而變 762 >700 → 又切回直式側欄 → 選單被切掉。實測驗過，勿再加。 */
function fitScale(){ try{
  const z=Math.max(1,Math.min(1.7,window.innerWidth/1366));
  document.body.style.zoom=z;
  /* 側欄高度要扣掉 zoom（見 .side 的 --vh 註解），否則側欄盒子比螢幕還高、底部被推出畫面 */
  document.documentElement.style.setProperty('--vh',(window.innerHeight/z)+'px');
}catch(e){} }
window.addEventListener('resize',fitScale); fitScale();
</script>
